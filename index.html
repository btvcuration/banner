<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B tv 실시간 배너 편성 시스템</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/feather-icons"></script>
  
  <style>
    body { font-family: 'Pretendard', 'Malgun Gothic', sans-serif; background-color: #f8f9fa; margin: 0; }
    .sidebar-item { transition: all 0.2s ease; }
    .sidebar-item.active { background-color: #fce8e6; color: #d93025; border-right: 3px solid #d93025; font-weight: 700; }
    .sidebar-item:hover:not(.active) { background-color: #f1f3f4; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .timeline-grid { background-size: 60px 100%; background-image: linear-gradient(to right, #f1f5f9 1px, transparent 1px); }
    .event-bar { transition: all 0.2s; }
    .event-bar:hover { filter: brightness(1.05); transform: translateY(-1px); z-index: 10; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes slideInRight { 
      from { transform: translateX(100%); opacity: 0; } 
      to { transform: translateX(0); opacity: 1; } 
    }
    .drawer-content { animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .modal-overlay { animation: fadeIn 0.2s ease-out forwards; }
    .modal-content { animation: slideUp 0.3s ease-out forwards; }
    .loader { border-top-color: #4f3df6; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
    @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="text-gray-800 antialiased h-screen flex overflow-hidden">
  <div id="root" class="w-full h-full"></div>

  <script type="text/babel">
  const GAS_API_URL = "https://royal-flower-ea31.alcheminos.workers.dev/"; 

  const FeatherIcon = ({ name, className }) => {
    const svgString = feather.icons[name] ? feather.icons[name].toSvg({ class: className }) : '';
    return <span dangerouslySetInnerHTML={{ __html: svgString }} className="inline-flex items-center justify-center" />;
  };

  // 날짜 포맷 (YYYY-MM-DD)
  const formatDateOnly = (dateString) => {
    if (!dateString) return '';
    return dateString.split('T')[0];
  };

  const calculateEndDate = (startStr, days) => {
    if(!startStr || !days) return '';
    const d = new Date(startStr);
    d.setDate(d.getDate() + (parseInt(days, 10) - 1));
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    return `${yyyy}-${mm}-${dd}`;
  };

  const calculateDuration = (startStr, endStr) => {
    if(!startStr || !endStr) return '';
    const start = new Date(startStr);
    const end = new Date(endStr);
    const diffTime = Math.abs(end - start);
    return Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
  };

  const getBannerBadgeStyle = (bannerType) => {
    switch (bannerType) {
      case '미니EPG': return 'bg-blue-100 text-blue-700 border-blue-200';
      case '편성표 배너': return 'bg-purple-100 text-purple-700 border-purple-200';
      case 'WingUI 배너': return 'bg-indigo-100 text-indigo-700 border-indigo-200';
      case '일반채널 배너트리거': 
      case '가이드채널 배너트리거': return 'bg-teal-100 text-teal-700 border-teal-200';
      default: return 'bg-gray-100 text-gray-700 border-gray-200';
    }
  };

  // --- [메인 애플리케이션] ---
  function App() {
    const [currentMenu, setCurrentMenu] = React.useState('list'); 
    
    const [events, setEvents] = React.useState([]); 
    const [actualEvents, setActualEvents] = React.useState([]); 
    const [filterType, setFilterType] = React.useState('전체');
    const [keyword, setKeyword] = React.useState('');
    const [isApprovalAuthed, setIsApprovalAuthed] = React.useState(false);
    const [isModalOpen, setIsModalOpen] = React.useState(false);
    const [editTarget, setEditTarget] = React.useState(null); 
    const [isLoading, setIsLoading] = React.useState(false); // 전체 로딩 상태
    
    const [sysConfig, setSysConfig] = React.useState({
      bannerTypes: ['미니EPG', '일반채널 배너트리거', '홈배너', 'WingUI 배너', '편성표 배너'],
      landingTypes: ['메뉴 바로가기', 'VOD 재생', '프로모션 페이지', '외부 링크'],
      channelGroups: [], singleChannels: [], channelMap: {}, landingDetails: []
    });

    const loadConfig = async () => {
      try {
        const res = await fetch(`${GAS_API_URL}?action=getConfig`);
        const data = await res.json();
        if (data && data.categories) {
          setSysConfig(prev => ({
            ...prev,
            bannerTypes: [...(data.categories['실시간 채널 편성'] || []), ...(data.categories['영역 편성'] || [])],
            landingTypes: data.landingTypes || prev.landingTypes,
            landingDetails: data.landingDetails || [],
            channelGroups: data.channelGroups || [],
            singleChannels: data.singleChannels || [],
            channelMap: data.channelMap || {}
          }));
        }
      } catch(e) { console.warn("설정 로드 실패", e); }
    };

    const loadRequests = async () => {
      try {
        const res = await fetch(`${GAS_API_URL}?action=getRequests`);
        const data = await res.json();
        if(Array.isArray(data)) {
          setEvents(data.map(item => ({
            id: item.요청ID,
            status: item.상태 === '승인완료' ? 'approved' : 'request',
            gubun: item.구분 || '신규',
            title: item.이벤트명,
            start: formatDateOnly(item.요청시작일),
            end: formatDateOnly(item.요청종료일),
            duration: item.편성기간 || '',
            targetGroup: item.편성영역 || '',
            targetChannel: item.대상채널_상세 || '',
            manager: item.담당자,
            bannerType: item.배너유형,
            landingType: item.랜딩유형 || '',
            landingDetail: item.랜딩세부내용 || '',
            targetSTB: item.대상STB || '전체',
            jiraLink: item.이미지_Jira링크 || '',
            note: item.비고 || ''
          })));
        }
      } catch(e) { console.warn("요청 리스트 로드 실패", e); }
    };

    const loadSchedules = async () => {
      try {
        const res = await fetch(`${GAS_API_URL}?action=getSchedules`);
        const data = await res.json();
        if(Array.isArray(data)) {
          setActualEvents(data.map(item => ({
            id: item.요청ID || `ACT-${Math.random()}`,
            title: item.이벤트명,
            bannerType: item.배너유형,
            start: formatDateOnly(item.요청시작일 || item.시작일),
            end: formatDateOnly(item.요청종료일 || item.종료일),
            status: 'actual'
          })));
        }
      } catch(e) { console.warn("실편성 리스트 로드 실패", e); }
    };

    React.useEffect(() => { 
      setIsLoading(true);
      Promise.all([loadConfig(), loadRequests(), loadSchedules()]).finally(() => setIsLoading(false));
    }, []);

    const filteredEvents = events.filter(e => {
      const matchType = filterType === '전체' || e.bannerType === filterType;
      const matchKeyword = 
        e.title.includes(keyword) || 
        e.manager.includes(keyword) || 
        (e.targetChannel && e.targetChannel.includes(keyword));
      return matchType && matchKeyword;
    });

    const openModal = (eventData = null) => { setEditTarget(eventData); setIsModalOpen(true); };
    const closeModal = () => { setIsModalOpen(false); setEditTarget(null); };

    // 💡 저장 시 DB 컬럼 완벽 매핑
    const handleSave = async (formData) => {
      setIsLoading(true);
      const action = editTarget ? 'updateRequest' : 'addRequest';
      const payload = { 
        구분: formData.gubun,
        이벤트명: formData.title,
        요청시작일: formData.start,
        요청종료일: formData.end,
        편성기간: formData.duration,
        편성영역: formData.targetGroup,
        대상채널_상세: formData.targetChannel,
        담당자: formData.manager,
        배너유형: formData.bannerType,
        랜딩유형: formData.landingType,
        랜딩세부내용: formData.landingDetail,
        대상STB: formData.targetSTB,
        이미지_Jira링크: formData.jiraLink,
        비고: formData.note,
        상태: '신규(요청)' 
      };

      if (editTarget) payload.요청ID = editTarget.id;

      try {
        await fetch(GAS_API_URL, {
          method: 'POST',
          headers: {'Content-Type': 'text/plain;charset=utf-8'},
          body: JSON.stringify({ action: action, payload: payload })
        });
        await loadRequests();
        closeModal();
      } catch(e) {
        alert("저장 중 네트워크 오류가 발생했습니다.");
      } finally {
        setIsLoading(false);
      }
    };

    const handleBulkApprove = async (ids) => {
      setIsLoading(true);
      try {
        for (const id of ids) {
          const target = events.find(e => e.id === id);
          if(!target) continue;
          await fetch(GAS_API_URL, {
            method: 'POST',
            headers: {'Content-Type': 'text/plain;charset=utf-8'},
            body: JSON.stringify({ action: 'approveRequest', payload: { 요청ID: id, 이벤트명: target.title, 배너유형: target.bannerType } })
          });
        }
        alert(`${ids.length}건이 승인 처리되었습니다.`);
        await loadRequests();
      } catch(e) { 
        alert("승인 중 오류가 발생했습니다."); 
      } finally {
        setIsLoading(false);
      }
    };

    return (
      <div className="w-full h-full flex bg-gray-50 relative">
        {/* 전체 화면 로딩 스피너 */}
        {isLoading && (
          <div className="absolute inset-0 z-[100] flex flex-col items-center justify-center bg-white/70 backdrop-blur-sm">
            <div className="loader border-4 border-gray-200 rounded-full w-12 h-12 mb-4"></div>
            <p className="text-[#4f3df6] font-bold">요청 처리 중...</p>
          </div>
        )}

        {/* 사이드바 */}
        <div className="w-64 bg-white border-r border-gray-200 flex flex-col shrink-0">
          <div className="p-6 flex flex-col border-b border-gray-100 items-center text-center">
            <div className="w-12 h-12 bg-white rounded-xl flex items-center justify-center mb-3 shadow-lg shadow-[#4f3df6]/20">
              <svg className="w-8 h-8 text-[#4f3df6] fill-current" viewBox="0 0 64 64">
                <path d="M45.7,30.9L45.7,30.9l0-0.2c2-2.1,3.1-4.9,3.2-7.8c0-0.7,0-1.5-0.2-2.2c-1.1-5.6-6-9.7-11.7-9.7H13v9.7h22.2c2,0,3.6,1.6,3.6,3.6s-1.6,3.6-3.6,3.6H23.1v-5l-10.1,5v25.2h24.7c7,0,12.6-5.6,12.6-12.6C50.2,36.7,48.5,33.3,45.7,30.9 M35.6,43.5H23.1v-7.8h12.5c2.2,0,3.9,1.7,3.9,3.9S37.8,43.5,35.6,43.5"></path>
              </svg>
            </div>
            <div><h1 className="font-bold text-gray-800 leading-tight text-sm">B tv 실시간 배너<br/>편성 요청 시스템</h1></div>
          </div>
          <nav className="flex-1 py-4 flex flex-col gap-1">
            <a href="#" onClick={(e) => { e.preventDefault(); setCurrentMenu('list'); }} className={`sidebar-item flex items-center gap-3 px-6 py-3 text-sm font-medium text-gray-600 ${currentMenu === 'list' ? 'active' : ''}`}>
              <FeatherIcon name="list" className="w-4 h-4" /> 편성 리스트
            </a>
            <a href="#" onClick={(e) => { e.preventDefault(); setCurrentMenu('approval'); }} className={`sidebar-item flex items-center gap-3 px-6 py-3 text-sm font-medium text-gray-600 ${currentMenu === 'approval' ? 'active' : ''}`}>
              <FeatherIcon name="check-circle" className="w-4 h-4" /> 프로모션 승인
            </a>
            <a href="#" onClick={(e) => { e.preventDefault(); setCurrentMenu('calendar'); }} className={`sidebar-item flex items-center gap-3 px-6 py-3 text-sm font-medium text-gray-600 ${currentMenu === 'calendar' ? 'active' : ''}`}>
              <FeatherIcon name="calendar" className="w-4 h-4" /> 편성 캘린더
            </a>
          </nav>
        </div>

        {/* 메인 콘텐츠 */}
        <div className="flex-1 flex flex-col min-w-0">
          <header className="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8 shrink-0 z-10 shadow-sm">
            <h2 className="text-lg font-bold text-gray-800 flex items-center gap-2">
              {currentMenu === 'list' && <><FeatherIcon name="list" className="w-5 h-5 text-blue-600"/> 전체 편성 리스트</>}
              {currentMenu === 'approval' && <><FeatherIcon name="check-circle" className="w-5 h-5 text-green-600"/> 대기열 승인 관리</>}
              {currentMenu === 'calendar' && <><FeatherIcon name="calendar" className="w-5 h-5 text-purple-600"/> 타임라인 캘린더</>}
            </h2>
            <div className="flex items-center gap-4">
            
            {/* 👇 편성 리스트일 때만 검색창 표시 */}
            {currentMenu === 'list' && (
              <div className="flex items-center bg-gray-100 rounded-lg px-3 py-1.5 border border-gray-200 focus-within:ring-2 focus-within:ring-[#4f3df6]/50 focus-within:bg-white transition-all">
                <FeatherIcon name="search" className="w-4 h-4 text-gray-500 mr-2"/>
                <input 
                  type="text" 
                  placeholder="프로모션명, 담당자, 채널 검색" 
                  value={keyword}
                  onChange={(e) => setKeyword(e.target.value)}
                  className="bg-transparent text-sm font-medium text-gray-800 outline-none w-56"
                />
              </div>
            )}

            <div className="flex items-center bg-gray-100 rounded-lg px-3 py-1.5 border border-gray-200">
              <FeatherIcon name="filter" className="w-4 h-4 text-gray-500 mr-2"/>
              <select value={filterType} onChange={(e) => setFilterType(e.target.value)} className="bg-transparent text-sm font-medium text-gray-700 outline-none cursor-pointer">
                <option value="전체">모든 배너 유형</option>
                {sysConfig.bannerTypes?.map(b => <option key={b} value={b}>{b}</option>)}
              </select>
            </div>
            {currentMenu === 'list' && (
              <button onClick={() => openModal()} className="bg-[#4f3df6] hover:bg-indigo-700 text-white font-bold px-4 py-2 rounded-lg text-sm flex items-center gap-1 transition-colors shadow-sm">
                <FeatherIcon name="plus" className="w-4 h-4"/> 신규 요청
              </button>
            )}
          </div>
        </header>

          <main className="flex-1 overflow-hidden relative">
            {currentMenu === 'list' && <ListView events={filteredEvents} sysConfig={sysConfig} onEdit={openModal} />}
            {currentMenu === 'approval' && (
              isApprovalAuthed 
                ? <ApprovalView events={filteredEvents} onApprove={handleBulkApprove} onEdit={openModal} /> 
                : <PasswordPrompt onAuth={() => setIsApprovalAuthed(true)} />
            )}
            {currentMenu === 'calendar' && <TimelineView events={filteredEvents} actualEvents={actualEvents} sysConfig={sysConfig} onEventClick={openModal} />}
          </main>
        </div>

        {isModalOpen && (
          <EventDetailDrawer 
            eventData={editTarget} 
            events={events} 
            sysConfig={sysConfig} 
            onClose={closeModal} 
            onSave={handleSave} 
            onGoToCalendar={() => { closeModal(); setCurrentMenu('calendar'); }}
          />
        )}
      </div>
    );
  }

  // --- [뷰 컴포넌트: 1. 편성 리스트] ---
  const ListView = ({ events, sysConfig, onEdit }) => {
    return (
      <div className="h-full overflow-y-auto p-6 bg-gray-50">
        <div className="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden flex flex-col">
          <div className="overflow-x-auto">
            <table className="w-full text-left text-sm min-w-[1200px]">
              <thead className="bg-gray-50 border-b border-gray-200 text-gray-600 font-bold sticky top-0 z-20">
                <tr>
                  <th className="p-3 w-16 text-center">상태</th>
                  <th className="p-3 min-w-[200px]">이벤트명</th>
                  <th className="p-3 min-w-[140px]">배너유형</th>
                  <th className="p-3 w-44 text-center">요청기간</th>
                  <th className="p-3 min-w-[200px]">대상채널 상세</th>
                  <th className="p-3 w-32">랜딩유형</th>
                  <th className="p-3 min-w-[150px]">랜딩 세부내용</th>
                  <th className="p-3 w-20 text-center">담당자</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-gray-100">
                {(!events || events.length === 0) ? <tr><td colSpan="8" className="p-8 text-center text-gray-500">조회된 데이터가 없습니다.</td></tr> : null}
                {events?.map(e => {
                  const isReq = e.status === 'request';
                  const badgeStyle = getBannerBadgeStyle(e.bannerType);
                  return (
                    <tr key={e.id} onClick={() => onEdit(e)} className={`hover:bg-blue-50/50 cursor-pointer transition-colors ${isReq ? 'bg-white' : 'bg-gray-50/40'}`}>
                      <td className="p-3 text-center align-middle whitespace-nowrap">
                        <span className={`inline-block px-2 py-1 rounded text-xs font-bold ${isReq ? 'bg-orange-50 text-orange-600 border border-orange-200' : 'bg-green-50 text-green-600 border border-green-200'}`}>{isReq ? '대기' : '승인'}</span>
                      </td>
                      <td className="p-3 font-bold text-gray-800 align-middle"><div className="truncate max-w-[250px]" title={e.title}>{e.title}</div></td>
                      <td className="p-3 align-middle"><span className={`px-2 py-1 rounded text-[11px] font-bold border ${badgeStyle} whitespace-nowrap`}>{e.bannerType}</span></td>
                      <td className="p-3 text-gray-600 text-[11px] align-middle text-center whitespace-nowrap font-mono tracking-tight">{e.start} <span className="text-gray-400 font-bold mx-0.5">~</span> {e.end}</td>
                      <td className="p-3 text-gray-600 text-xs align-middle">{e.targetChannel ? <div className="line-clamp-2 w-full max-w-[300px]" title={e.targetChannel}>{e.targetChannel}</div> : <span className="text-gray-400">-</span>}</td>
                      <td className="p-3 text-gray-600 text-xs align-middle whitespace-nowrap">{e.landingType || '-'}</td>
                      <td className="p-3 text-gray-600 text-xs font-mono align-middle"><div className="truncate max-w-[200px]" title={e.landingDetail}>{e.landingDetail || '-'}</div></td>
                      <td className="p-3 text-gray-800 text-xs font-bold text-center align-middle">{e.manager}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    );
  };

  // --- [뷰 컴포넌트: 2. 승인 관리] ---
  const ApprovalView = ({ events, onApprove, onEdit }) => {
    const pendingEvents = events?.filter(e => e.status === 'request') || [];
    const [selected, setSelected] = React.useState([]);
    const toggleSelect = (id) => setSelected(prev => prev.includes(id) ? prev.filter(item => item !== id) : [...prev, id]);
    const selectAll = () => setSelected(selected.length === pendingEvents.length ? [] : pendingEvents.map(e => e.id));

    return (
      <div className="h-full flex flex-col p-6 bg-gray-50">
        <div className="mb-4 flex justify-between items-end">
          <h3 className="text-lg font-bold text-gray-800">승인 대기 목록</h3>
          <button onClick={() => onApprove(selected)} disabled={selected.length === 0} className="bg-green-600 hover:bg-green-700 disabled:bg-gray-300 text-white font-bold px-6 py-2.5 rounded-lg text-sm flex items-center gap-2 shadow-sm">
            <FeatherIcon name="check" className="w-4 h-4"/> 선택 항목 승인 ({selected.length})
          </button>
        </div>
        <div className="bg-white border border-gray-200 rounded-xl flex-1 overflow-y-auto shadow-sm">
          <table className="w-full text-left text-sm">
            <thead className="bg-gray-50 border-b border-gray-200 sticky top-0 z-10">
              <tr>
                <th className="p-4 w-12 text-center align-middle"><input type="checkbox" onChange={selectAll} checked={selected.length > 0 && selected.length === pendingEvents.length} className="w-4 h-4 rounded text-blue-600 cursor-pointer"/></th>
                <th className="p-4">이벤트명 (클릭하여 상세 보기)</th>
                <th className="p-4 w-64 text-center">요청기간</th>
              </tr>
            </thead>
            <tbody className="divide-y divide-gray-100">
              {pendingEvents.length === 0 && <tr><td colSpan="3" className="p-12 text-center text-gray-500">대기 중인 항목이 없습니다.</td></tr>}
              {pendingEvents.map(e => (
                <tr key={e.id} className={`hover:bg-blue-50 transition-colors ${selected.includes(e.id) ? 'bg-blue-50/30' : ''}`}>
                  <td className="p-4 text-center cursor-pointer align-middle" onClick={() => toggleSelect(e.id)}>

          </table>
        </div>
      </div>
    );
  };

  const PasswordPrompt = ({ onAuth }) => {
    const [pwd, setPwd] = React.useState('');
    const checkPwd = (e) => { e.preventDefault(); if (pwd === '2685') onAuth(); else { alert('비밀번호가 일치하지 않습니다.'); setPwd(''); } };
    return (
      <div className="h-full flex items-center justify-center bg-gray-100">
        <form onSubmit={checkPwd} className="bg-white p-8 rounded-xl shadow-lg border border-gray-200 w-96 flex flex-col items-center">
          <div className="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mb-4"><FeatherIcon name="lock" className="w-8 h-8"/></div>
          <h3 className="text-xl font-bold text-gray-800 mb-2">관리자 인증</h3>
          <input type="password" value={pwd} onChange={e=>setPwd(e.target.value)} autoFocus placeholder="비밀번호 입력" className="w-full border border-gray-300 rounded-lg p-3 text-center mb-4 outline-none font-mono text-lg tracking-widest"/>
          <button type="submit" className="w-full bg-red-600 text-white font-bold py-3 rounded-lg hover:bg-red-700">잠금 해제</button>
        </form>
      </div>
    );
  };

  // --- [뷰 컴포넌트: 3. 타임라인 캘린더] ---
  const TimelineView = ({ events, actualEvents, sysConfig, onEventClick }) => {
    const [viewMode, setViewMode] = React.useState('request'); 
    const today = new Date();
    const viewStartDate = new Date(today.getFullYear(), today.getMonth(), 1); 
    const daysToView = 31; 
    const cellWidth = 60; 
    
    const dates = Array.from({length: daysToView}, (_, i) => {
      const d = new Date(viewStartDate);
      d.setDate(d.getDate() + i);
      return d;
    });

    const getEventStyle = (event) => {
      const eStart = new Date(event.start);
      const eEnd = new Date(event.end);
      let rStart = eStart < viewStartDate ? viewStartDate : eStart;
      const leftDays = Math.floor(Math.abs(rStart - viewStartDate) / 86400000);
      const widthDays = Math.floor(Math.abs(eEnd - eStart) / 86400000) + 1;
      return { left: `${leftDays * cellWidth}px`, width: `${widthDays * cellWidth}px` };
    };

    const displayEvents = viewMode === 'request' ? events : actualEvents;

    return (
      <div className="h-full flex flex-col p-6 bg-gray-50">
        <div className="flex-1 bg-white border border-gray-200 rounded-xl shadow-sm flex flex-col overflow-hidden">
          <div className="h-14 flex items-center justify-between px-6 border-b border-gray-200 bg-gray-50 shrink-0">
            <div className="text-sm font-bold text-gray-700">{today.getFullYear()}년 {today.getMonth() + 1}월 편성 현황</div>
            <div className="flex bg-gray-200 rounded-lg p-1 border border-gray-300">
              <button onClick={() => setViewMode('request')} className={`px-4 py-1.5 rounded-md text-sm font-bold transition-colors ${viewMode === 'request' ? 'bg-white text-blue-700 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>담당자 요청 일정</button>
              <button onClick={() => setViewMode('actual')} className={`px-4 py-1.5 rounded-md text-sm font-bold transition-colors flex items-center gap-1 ${viewMode === 'actual' ? 'bg-white text-purple-700 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}><FeatherIcon name="database" className="w-4 h-4"/> 실편성 조율 일정</button>
            </div>
          </div>
          
          <div className="flex flex-1 overflow-hidden">
            <div className="w-48 shrink-0 border-r border-gray-200 bg-gray-50 overflow-y-auto">
              <div className="h-12 border-b border-gray-200 flex items-center justify-center text-xs font-bold text-gray-500">배너 유형</div>
              {sysConfig.bannerTypes?.map(res => (
                <div key={res} className="h-16 border-b border-gray-200 px-3 flex items-center justify-center text-center text-sm font-bold text-gray-700 bg-white shadow-[2px_0_4px_rgba(0,0,0,0.02)] z-10 relative">{res}</div>
              ))}
            </div>
            <div className="flex-1 overflow-x-auto relative overflow-y-auto">
              <div className="flex h-12 border-b border-gray-200 sticky top-0 bg-white z-10" style={{ width: `${daysToView * cellWidth}px` }}>
                {dates.map((d, i) => (
                  <div key={i} className={`border-r border-gray-100 flex flex-col items-center justify-center shrink-0 ${d.getDay() === 0 || d.getDay() === 6 ? 'bg-red-50/30 text-red-500' : 'text-gray-600'}`} style={{ width: `${cellWidth}px` }}>
                    <span className="text-[10px] font-bold">{['일','월','화','수','목','금','토'][d.getDay()]}</span>
                    <span className="text-sm font-black">{d.getDate()}</span>
                  </div>
                ))}
              </div>
              <div className="relative timeline-grid" style={{ width: `${daysToView * cellWidth}px`, height: `${sysConfig.bannerTypes?.length * 4}rem` }}>
                {sysConfig.bannerTypes?.map((res) => {
                  const rowEvents = displayEvents?.filter(e => e.bannerType === res) || [];
                  return (
                    <div key={res} className="h-16 border-b border-gray-100 relative group hover:bg-blue-50/20">
                      {rowEvents.map(event => {
                        const style = getEventStyle(event);
                        const isReq = event.status === 'request';
                        let visualClass = viewMode === 'actual' ? 'bg-purple-600 text-white font-bold shadow-md border border-purple-800' : (isReq ? 'border-2 border-dashed border-orange-500 bg-white text-orange-700 font-bold shadow-sm' : 'bg-blue-500 text-white font-medium shadow');
                        return (
                          <div key={event.id} onClick={() => viewMode === 'request' && onEventClick(event)} className={`event-bar absolute top-2 h-11 rounded-md px-2 py-1 overflow-hidden cursor-pointer flex flex-col justify-center text-xs leading-tight ${visualClass}`} style={{ left: style.left, width: `calc(${style.width} - 4px)` }}>
                            <div className="truncate">{event.title}</div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  };

  // --- [기존 EventModal을 대체하는 EventDetailDrawer 컴포넌트] ---
const EventDetailDrawer = ({ eventData, events, sysConfig, onClose, onSave, onGoToCalendar }) => {
  const isReadOnly = eventData && eventData.status === 'approved';
  const [form, setForm] = React.useState(eventData || {
    gubun: '신규', title: '', manager: '', bannerType: sysConfig.bannerTypes?.[0] || '미니EPG', 
    epgTargetType: 'channel', targetChannel: '', targetProgram: '', targetSTB: '전체',
    landingType: sysConfig.landingTypes?.[0] || '메뉴 바로가기', 
    landingDepth1: '', landingDepth2: '', landingDetail: '', 
    jiraLink: '', start: '', end: '', duration: '', note: ''
  });
  
  const [overlapWarning, setOverlapWarning] = React.useState(null);
  const [showChannelNumber, setShowChannelNumber] = React.useState(true);
  const [showHistoryModal, setShowHistoryModal] = React.useState(false);
  const needsTargeting = ['미니EPG', '가이드채널 배너트리거', '일반채널 배너트리거'].includes(form.bannerType);

  // 랜딩 Depth 로직 (기존 동일)
  const availableLandingDepth1 = React.useMemo(() => {
    if (!sysConfig.landingDetails) return [];
    const d1 = sysConfig.landingDetails.filter(l => l['랜딩 유형'] === '메뉴 바로가기').map(l => l['1Depth']);
    return [...new Set(d1)].filter(Boolean);
  }, [sysConfig.landingDetails]);

  const availableLandingDepth2 = React.useMemo(() => {
    if (!sysConfig.landingDetails || !form.landingDepth1) return [];
    return sysConfig.landingDetails.filter(l => l['랜딩 유형'] === '메뉴 바로가기' && l['1Depth'] === form.landingDepth1);
  }, [sysConfig.landingDetails, form.landingDepth1]);

  // 채널 로직 (기존 동일)
  const { standaloneChannels, groupChannels } = React.useMemo(() => {
    if (!sysConfig.channelMap) return { standaloneChannels: [], groupChannels: [] };
    const standaloneNumbers = [0, 1, 52, 70, 71, 88, 974, 982, 986, 987, 988, 989];
    let st = [], gr = [];
    Object.entries(sysConfig.channelMap).forEach(([groupName, channels]) => {
      if (/(성인|교육|공공|종교)/.test(groupName)) return;
      const isTerrestrial = groupName.includes("지상파") || groupName.includes("종편");
      let odds = [], evens = [];
      channels.forEach(ch => {
        const num = parseInt(ch.num, 10);
        const displayCh = showChannelNumber ? ch.fullName : ch.fullName.replace(/\[\d+번\]\s*/, '');
        if (standaloneNumbers.includes(num)) st.push(`[단독선택] ${displayCh}`);
        else if (isTerrestrial) gr.push(`[${groupName}] ${displayCh}`);
        else { if (num % 2 !== 0) odds.push(num); else evens.push(num); }
      });
      if (!isTerrestrial) {
        odds.sort((a,b) => a - b); evens.sort((a,b) => a - b);
        if (odds.length > 0) gr.push(`${groupName} 홀수 ${showChannelNumber ? `(${odds.join(', ')})` : ''}`);
        if (evens.length > 0) gr.push(`${groupName} 짝수 ${showChannelNumber ? `(${evens.join(', ')})` : ''}`);
      }
    });
    return { standaloneChannels: st, groupChannels: gr };
  }, [sysConfig.channelMap, showChannelNumber]);

  // 핸들러 (기존 동일)
  const handleChange = (e) => {
    const { name, value } = e.target;
    setForm(prev => {
      const next = { ...prev, [name]: value };
      if (name === 'start' && next.duration) next.end = calculateEndDate(value, next.duration);
      else if (name === 'end' && next.start) next.duration = calculateDuration(next.start, value);
      else if (name === 'duration' && next.start) next.end = calculateEndDate(next.start, value);
      if (name === 'landingDepth1') { next.landingDepth2 = ''; next.landingDetail = ''; }
      if (name === 'landingDepth2') {
        const selectedObj = availableLandingDepth2.find(l => l['2Depth'] === value);
        next.landingDetail = selectedObj ? selectedObj['URL'] : '';
      }
      return next;
    });
  };

  const handleChannelCheck = (option) => {
    if (isReadOnly) return;
    let currentList = form.targetChannel ? form.targetChannel.split(' / ') : [];
    if (currentList.includes(option)) currentList = currentList.filter(item => item !== option);
    else currentList.push(option);
    setForm(prev => ({ ...prev, targetChannel: currentList.join(' / ') }));
  };

  return (
    <>
      {/* 백그라운드 딤 처리 (클릭 시 닫힘) */}
      <div 
        className="fixed inset-0 z-40 bg-gray-900/50 backdrop-blur-sm transition-opacity" 
        onClick={onClose}
      ></div>

      {/* 우측 Drawer UI */}
      <div className="fixed inset-y-0 right-0 z-50 w-full max-w-[680px] bg-gray-50 shadow-2xl flex flex-col drawer-content">
        
        {/* Drawer Header */}
        <div className={`px-6 py-4 flex justify-between items-center text-white shrink-0 ${isReadOnly ? 'bg-gray-600' : 'bg-[#4f3df6]'}`}>
          <h3 className="font-bold text-lg flex items-center gap-2">
            <FeatherIcon name={isReadOnly ? 'file-text' : 'edit'} className="w-5 h-5"/>
            {isReadOnly ? '프로모션 상세 내역' : '신규 프로모션 편성'}
          </h3>
          <button onClick={onClose} className="text-white/80 hover:text-white transition-colors">
            <FeatherIcon name="x" className="w-6 h-6"/>
          </button>
        </div>

        {/* 본문 폼 (스크롤 영역) */}
        <form id="drawerForm" className="flex-1 overflow-y-auto p-6 space-y-6">
          
          {/* Section 1: 기본 정보 (기존 폼 재사용) */}
          <section className="bg-white border border-gray-200 rounded-xl p-5 shadow-sm relative">
            <div className="absolute top-0 left-0 w-1.5 h-full bg-[#4f3df6] rounded-l-xl"></div>
            <div className="flex justify-between items-center mb-4">
              <h4 className="text-sm font-bold text-gray-800 flex items-center gap-2"><FeatherIcon name="info" className="w-4 h-4 text-[#4f3df6]"/> 기본 정보</h4>
              {form.gubun === '재편성' && !isReadOnly && (
                <button type="button" onClick={() => setShowHistoryModal(true)} className="bg-indigo-50 border border-indigo-200 text-indigo-700 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-indigo-100 flex items-center gap-1">
                  <FeatherIcon name="search" className="w-3 h-3"/> 과거 이력 불러오기
                </button>
              )}
            </div>
            <div className="grid grid-cols-4 gap-4">
              <div>
                <label className="block text-xs font-bold text-gray-700 mb-1.5">구분</label>
                <select name="gubun" value={form.gubun} onChange={handleChange} className="w-full border border-gray-300 rounded-lg p-2 text-sm outline-none"><option>신규</option><option>재편성</option></select>
              </div>
              <div className="col-span-2">
                <label className="block text-xs font-bold text-gray-700 mb-1.5">프로모션명</label>
                <input type="text" name="title" value={form.title} onChange={handleChange} required className="w-full border border-gray-300 rounded-lg p-2 text-sm outline-none"/>
              </div>
              <div>
                <label className="block text-xs font-bold text-gray-700 mb-1.5">담당자</label>
                <input type="text" name="manager" value={form.manager} onChange={handleChange} required className="w-full border border-gray-300 rounded-lg p-2 text-sm outline-none"/>
              </div>
              <div>
                <label className="block text-xs font-bold text-gray-700 mb-1.5">배너 영역</label>
                <select name="bannerType" value={form.bannerType} onChange={handleChange} className="w-full border border-gray-300 rounded-lg p-2 text-sm outline-none">{sysConfig.bannerTypes?.map(b => <option key={b} value={b}>{b}</option>)}</select>
              </div>
              <div>
                <label className="block text-xs font-bold text-gray-700 mb-1.5">대상 STB</label>
                <input type="text" name="targetSTB" value={form.targetSTB} onChange={handleChange} className="w-full border border-gray-300 rounded-lg p-2 text-sm outline-none"/>
              </div>
              <div className="col-span-2 grid grid-cols-3 gap-2 border border-gray-200 rounded-lg p-2 bg-gray-50">
                <div><label className="block text-[11px] font-bold text-gray-600 mb-1">시작일</label><input type="date" name="start" value={form.start} onChange={handleChange} required className="w-full border rounded p-1.5 text-sm outline-none"/></div>
                <div><label className="block text-[11px] font-bold text-gray-600 mb-1">기간(일)</label><input type="number" name="duration" value={form.duration} onChange={handleChange} className="w-full border rounded p-1.5 text-sm outline-none"/></div>
                <div><label className="block text-[11px] font-bold text-gray-600 mb-1">종료일</label><input type="date" name="end" value={form.end} onChange={handleChange} required className="w-full border rounded p-1.5 text-sm outline-none"/></div>
              </div>
            </div>
          </section>

          {/* Section 2: 상세 편성 대상 (기존 폼 재사용) */}
          {needsTargeting && (
            <section className="bg-white border border-gray-200 rounded-xl p-5 shadow-sm">
              <div className="flex justify-between items-end mb-3">
                <h4 className="text-sm font-bold text-gray-800 flex items-center gap-2"><FeatherIcon name="target" className="w-4 h-4 text-orange-500"/> 상세 편성 채널 선택 <span className="text-red-500">*</span></h4>
                <label className="flex items-center gap-1.5 cursor-pointer bg-gray-100 px-2 py-1 rounded">
                  <input type="checkbox" checked={showChannelNumber} onChange={(e) => setShowChannelNumber(e.target.checked)} className="w-3.5 h-3.5 text-blue-600 rounded"/>
                  <span className="text-xs font-bold text-gray-600">채널 번호 함께 보기</span>
                </label>
              </div>
              
              <div className="grid grid-cols-3 gap-4 h-56">
                {/* 좌측: 단독 채널 */}
                <div className="col-span-1 border border-blue-200 bg-blue-50/30 rounded-lg p-3 flex flex-col">
                  <div className="text-xs font-bold text-blue-800 mb-2 border-b border-blue-200 pb-1">단독 및 주요 채널</div>
                  <div className="flex-1 overflow-y-auto space-y-1 pr-1">
                    {standaloneChannels.map(option => {
                      const isChecked = (form.targetChannel || '').includes(option);
                      return (
                        <label key={option} className={`flex items-start gap-2 p-1.5 rounded cursor-pointer transition-colors border ${isChecked ? 'bg-blue-100 border-blue-300' : 'border-transparent hover:bg-white'}`}>
                          <input type="checkbox" checked={isChecked} onChange={() => handleChannelCheck(option)} disabled={isReadOnly} className="mt-0.5 w-3.5 h-3.5 text-blue-600 rounded cursor-pointer"/>
                          <span className="text-[11px] text-gray-800 font-medium leading-tight">{option}</span>
                        </label>
                      );
                    })}
                  </div>
                </div>
                
                {/* 우측: 그룹 및 장르 채널 */}
                <div className="col-span-2 border border-gray-200 bg-white rounded-lg p-3 flex flex-col shadow-inner">
                  <div className="text-xs font-bold text-gray-700 mb-2 border-b pb-1">장르 및 홀/짝수 그룹 묶음</div>
                  <div className="flex-1 overflow-y-auto grid grid-cols-2 gap-1 pr-1 content-start">
                    {groupChannels.map(option => {
                      const isChecked = (form.targetChannel || '').includes(option);
                      return (
                        <label key={option} className={`flex items-start gap-2 p-1.5 rounded cursor-pointer transition-colors border ${isChecked ? 'bg-orange-50 border-orange-200' : 'border-gray-100 hover:bg-gray-50'}`}>
                          <input type="checkbox" checked={isChecked} onChange={() => handleChannelCheck(option)} disabled={isReadOnly} className="mt-0.5 w-3.5 h-3.5 text-orange-600 rounded cursor-pointer"/>

          {/* 에러 뷰 영역 */}
          {!isReadOnly && overlapWarning && (
            <div className={`p-4 rounded-lg border shadow-sm ${overlapWarning.type === 'block' ? 'bg-red-50 border-red-200' : 'bg-orange-50 border-orange-200'}`}>
              <h4 className={`text-sm font-bold flex items-center gap-2 mb-2 ${overlapWarning.type === 'block' ? 'text-red-700' : 'text-orange-700'}`}><FeatherIcon name="alert-triangle" className="w-4 h-4"/> {overlapWarning.message}</h4>
              <ul className="text-xs text-gray-600 list-disc list-inside space-y-1">{overlapWarning.items.map((item, idx) => <li key={idx}>{item}</li>)}</ul>
            </div>
          )}
        </form>

        {/* 👇 Sticky Footer (하단에 항상 고정) */}
        <div className="sticky bottom-0 bg-white border-t border-gray-200 px-6 py-4 flex justify-end gap-3 shrink-0 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)] z-10">
          <button type="button" onClick={onClose} className="px-5 py-2.5 rounded-lg text-sm font-bold text-gray-700 bg-white border border-gray-300 hover:bg-gray-100 transition-colors">
            {isReadOnly ? '닫기' : '취소'}
          </button>
          
          {/* 에러 수정: onClick={() => onSave(form)} 으로 직접 연결 */}
          {!isReadOnly && (
            overlapWarning?.type === 'block' ? (
              <button type="button" onClick={onGoToCalendar} className="px-6 py-2.5 rounded-lg text-sm font-bold text-red-600 bg-red-50 border border-red-200 hover:bg-red-100 transition-colors flex items-center gap-2 shadow-sm">
                <FeatherIcon name="calendar" className="w-4 h-4"/> 빈 일정 찾기
              </button>
            ) : (
              <button type="button" onClick={(e) => { e.preventDefault(); onSave(form); }} className="px-6 py-2.5 rounded-lg text-sm font-bold text-white bg-[#4f3df6] hover:bg-indigo-700 transition-colors flex items-center gap-2 shadow-sm">
                <FeatherIcon name="save" className="w-4 h-4"/> {overlapWarning?.type === 'info' ? '인지 후 저장' : '저장 및 요청'}
              </button>
            )
          )}
        </div>

        {/* 과거 이력 불러오기 팝업 (기존 동일) */}
        {showHistoryModal && (
          <div className="absolute inset-0 bg-white/90 backdrop-blur-sm z-50 flex items-center justify-center p-6">
            <div className="bg-white w-full h-full max-h-[500px] border border-gray-200 rounded-2xl shadow-xl flex flex-col overflow-hidden">
              <div className="px-5 py-4 border-b bg-gray-50 flex justify-between items-center">
                <h4 className="font-bold text-sm text-gray-800">과거 이력 불러오기</h4>
                <button onClick={() => setShowHistoryModal(false)} className="text-gray-500 hover:text-gray-800"><FeatherIcon name="x" className="w-5 h-5"/></button>
              </div>
              <div className="flex-1 overflow-y-auto p-4">
                {events?.filter(e => e.status === 'approved').map(past => (
                  <div key={past.id} onClick={() => {
                    setForm(p => ({ ...p, title: past.title, manager: past.manager, bannerType: past.bannerType, targetChannel: past.targetChannel, landingType: past.landingType, landingDetail: past.landingDetail, targetSTB: past.targetSTB }));
                    setShowHistoryModal(false);
                  }} className="border border-gray-200 rounded-lg p-3 mb-2 cursor-pointer hover:border-[#4f3df6] hover:bg-indigo-50 transition-colors">
                    <div className="font-bold text-sm text-gray-800">{past.title}</div>
                    <div className="text-xs text-gray-500 mt-1 flex gap-2"><span>{past.bannerType}</span><span>담당: {past.manager}</span></div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}
      </div>
    </>
  );
};

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
