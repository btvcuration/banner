<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B tv 실시간 배너 편성 시스템</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/feather-icons"></script>
  
  <style>
    body { font-family: 'Pretendard', 'Malgun Gothic', sans-serif; background-color: #f8f9fa; margin: 0; }
    .sidebar-item { transition: all 0.2s ease; }
    .sidebar-item.active { background-color: #fce8e6; color: #d93025; border-right: 3px solid #d93025; font-weight: 700; }
    .sidebar-item:hover:not(.active) { background-color: #f1f3f4; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .timeline-grid { background-size: 60px 100%; background-image: linear-gradient(to right, #f1f5f9 1px, transparent 1px); }
    .event-bar { transition: all 0.2s; }
    .event-bar:hover { filter: brightness(1.05); transform: translateY(-1px); z-index: 10; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-overlay { animation: fadeIn 0.2s ease-out forwards; }
    .modal-content { animation: slideUp 0.3s ease-out forwards; }
  </style>
</head>
<body class="text-gray-800 antialiased h-screen flex overflow-hidden">
  <div id="root" class="w-full h-full"></div>

  <script type="text/babel">
  const GAS_API_URL = "https://royal-flower-ea31.alcheminos.workers.dev/"; 

  const FeatherIcon = ({ name, className }) => {
    const svgString = feather.icons[name] ? feather.icons[name].toSvg({ class: className }) : '';
    return <span dangerouslySetInnerHTML={{ __html: svgString }} className="inline-flex items-center justify-center" />;
  };

  // --- [메인 애플리케이션] ---
  function App() {
    const [currentMenu, setCurrentMenu] = React.useState('list'); 
    
    // 상태 관리
    const [events, setEvents] = React.useState([]);             // 요청_DB
    const [actualEvents, setActualEvents] = React.useState([]); // 실편성_DB
    const [filterType, setFilterType] = React.useState('전체');
    const [isApprovalAuthed, setIsApprovalAuthed] = React.useState(false);
    const [isModalOpen, setIsModalOpen] = React.useState(false);
    const [editTarget, setEditTarget] = React.useState(null); 
    
    // GAS에서 불러올 동적 시스템 설정값 (초기값 세팅)
    const [sysConfig, setSysConfig] = React.useState({
      bannerTypes: ['미니EPG', '일반채널 배너트리거', '홈배너', 'WingUI 배너', '편성표 배너'],
      landingTypes: ['메뉴 이동', 'VOD 재생', '프로모션 페이지', '외부 링크'],
      channelGroups: [],
      singleChannels: [],
      channelMap: {}
    });

    // 1. 시스템 설정값 로드 (getConfig)
    const loadConfig = async () => {
      try {
        const res = await fetch(`${GAS_API_URL}?action=getConfig`);
        const data = await res.json();
        if (data && data.categories) {
          setSysConfig({
            bannerTypes: [...(data.categories['실시간 채널 편성'] || []), ...(data.categories['영역 편성'] || [])],
            landingTypes: data.landingTypes || [],
            channelGroups: data.channelGroups || [],
            singleChannels: data.singleChannels || [],
            channelMap: data.channelMap || {}
          });
        }
      } catch(e) { console.warn("설정값 로드 실패 (기본값 사용)", e); }
    };

    // 2. 편성 요청 리스트 로드 (getRequests)
    const loadRequests = async () => {
      try {
        const res = await fetch(`${GAS_API_URL}?action=getRequests`);
        const data = await res.json();
        
        if(Array.isArray(data)) {
          setEvents(data.map(item => ({
            id: item.요청ID,
            title: item.이벤트명,
            manager: item.담당자,
            bannerType: item.배너유형,
            targetGroup: item.편성그룹 || '',
            targetChannel: item.편성채널 || '',
            targetProgram: item.편성프로그램 || '',
            start: item.요청시작일,
            end: item.요청종료일,
            status: item.상태 === '승인완료' ? 'approved' : 'request',
          })));
        }
      } catch(e) { console.warn("요청 리스트 로드 실패", e); }
    };

    // 3. 실편성 데이터 로드 (getSchedules)
    const loadSchedules = async () => {
      try {
        const res = await fetch(`${GAS_API_URL}?action=getSchedules`);
        const data = await res.json();
        if(Array.isArray(data)) {
          setActualEvents(data.map(item => ({
            id: item.요청ID || `ACT-${Math.random()}`,
            title: item.이벤트명,
            bannerType: item.배너유형,
            start: item.요청시작일 || item.시작일,
            end: item.요청종료일 || item.종료일,
            status: 'actual'
          })));
        }
      } catch(e) { console.warn("실편성 리스트 로드 실패", e); }
    };

    React.useEffect(() => { 
      loadConfig();
      loadRequests();
      loadSchedules();
    }, []);

    const filteredEvents = events.filter(e => filterType === '전체' || e.bannerType === filterType);

    const openModal = (eventData = null) => { setEditTarget(eventData); setIsModalOpen(true); };
    const closeModal = () => { setIsModalOpen(false); setEditTarget(null); };

    // [중요] POST 요청 시 text/plain 으로 CORS 우회
    const handleSave = async (formData) => {
      const action = editTarget ? 'updateRequest' : 'addRequest';
      const payload = { 
        ...formData, 
        이벤트명: formData.title, 
        담당자: formData.manager,
        배너유형: formData.bannerType,
        편성그룹: formData.targetGroup,
        편성채널: formData.targetChannel,
        편성프로그램: formData.targetProgram,
        요청시작일: formData.start,
        요청종료일: formData.end,
        상태: '신규(요청)' 
      };

      try {
        await fetch(GAS_API_URL, {
          method: 'POST',
          headers: {'Content-Type': 'text/plain;charset=utf-8'},
          body: JSON.stringify({ action: action, payload: payload })
        });
        alert("요청이 정상적으로 저장되었습니다.");
        loadRequests(); // 저장 후 리스트 리로드
      } catch(e) {
        alert("저장 중 오류가 발생했습니다. (임시 화면 반영)");
        // 에러 시 프론트 임시 반영 (테스트용)
        if (editTarget) setEvents(events.map(e => e.id === editTarget.id ? { ...e, ...formData } : e));
        else setEvents([...events, { ...formData, id: Date.now().toString(), status: 'request' }]);
      }
      closeModal();
    };

    const handleBulkApprove = async (ids) => {
      try {
        for (const id of ids) {
          const target = events.find(e => e.id === id);
          if(!target) continue;
          
          await fetch(GAS_API_URL, {
            method: 'POST',
            headers: {'Content-Type': 'text/plain;charset=utf-8'},
            body: JSON.stringify({ action: 'approveRequest', payload: { 요청ID: id, 이벤트명: target.title, 배너유형: target.bannerType } })
          });
        }
        alert(`${ids.length}건이 승인 처리되었습니다.`);
        loadRequests();
      } catch(e) { 
        alert("승인 중 오류가 발생했습니다."); 
      }
    };

    return (
      <div className="w-full h-full flex bg-gray-50">
        {/* 사이드바 */}
        <div className="w-64 bg-white border-r border-gray-200 flex flex-col shrink-0">
          <div className="p-6 flex flex-col border-b border-gray-100 items-center text-center">
            {/* SVG 로고 반영 */}
            <div className="w-12 h-12 bg-white rounded-xl flex items-center justify-center mb-3 shadow-lg shadow-[#4f3df6]/20">
              <svg className="w-8 h-8 text-[#4f3df6] fill-current" viewBox="0 0 64 64">
                <path d="M45.7,30.9L45.7,30.9l0-0.2c2-2.1,3.1-4.9,3.2-7.8c0-0.7,0-1.5-0.2-2.2c-1.1-5.6-6-9.7-11.7-9.7H13v9.7h22.2c2,0,3.6,1.6,3.6,3.6s-1.6,3.6-3.6,3.6H23.1v-5l-10.1,5v25.2h24.7c7,0,12.6-5.6,12.6-12.6C50.2,36.7,48.5,33.3,45.7,30.9 M35.6,43.5H23.1v-7.8h12.5c2.2,0,3.9,1.7,3.9,3.9S37.8,43.5,35.6,43.5"></path>
              </svg>
            </div>
            <div><h1 className="font-bold text-gray-800 leading-tight text-sm">B tv 실시간 배너<br/>편성 요청 시스템</h1></div>
          </div>
          <nav className="flex-1 py-4 flex flex-col gap-1">
            <a href="#" onClick={(e) => { e.preventDefault(); setCurrentMenu('list'); }} className={`sidebar-item flex items-center gap-3 px-6 py-3 text-sm font-medium text-gray-600 ${currentMenu === 'list' ? 'active' : ''}`}>
              <FeatherIcon name="list" className="w-4 h-4" /> 편성 리스트
            </a>
            <a href="#" onClick={(e) => { e.preventDefault(); setCurrentMenu('approval'); }} className={`sidebar-item flex items-center gap-3 px-6 py-3 text-sm font-medium text-gray-600 ${currentMenu === 'approval' ? 'active' : ''}`}>
              <FeatherIcon name="check-circle" className="w-4 h-4" /> 프로모션 승인
            </a>
            <a href="#" onClick={(e) => { e.preventDefault(); setCurrentMenu('calendar'); }} className={`sidebar-item flex items-center gap-3 px-6 py-3 text-sm font-medium text-gray-600 ${currentMenu === 'calendar' ? 'active' : ''}`}>
              <FeatherIcon name="calendar" className="w-4 h-4" /> 편성 캘린더
            </a>
          </nav>
        </div>

        {/* 메인 콘텐츠 영역 */}
        <div className="flex-1 flex flex-col min-w-0">
          <header className="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8 shrink-0 z-10 shadow-sm">
            <h2 className="text-lg font-bold text-gray-800 flex items-center gap-2">
              {currentMenu === 'list' && <><FeatherIcon name="list" className="w-5 h-5 text-blue-600"/> 전체 편성 리스트</>}
              {currentMenu === 'approval' && <><FeatherIcon name="check-circle" className="w-5 h-5 text-green-600"/> 대기열 승인 관리</>}
              {currentMenu === 'calendar' && <><FeatherIcon name="calendar" className="w-5 h-5 text-purple-600"/> 타임라인 캘린더</>}
            </h2>
            
            <div className="flex items-center gap-4">
              <div className="flex items-center bg-gray-100 rounded-lg px-3 py-1.5 border border-gray-200">
                <FeatherIcon name="filter" className="w-4 h-4 text-gray-500 mr-2"/>
                <select value={filterType} onChange={(e) => setFilterType(e.target.value)} className="bg-transparent text-sm font-medium text-gray-700 outline-none cursor-pointer">
                  <option value="전체">모든 배너 유형</option>
                  {sysConfig.bannerTypes.map(b => <option key={b} value={b}>{b}</option>)}
                </select>
              </div>
              {currentMenu === 'list' && (
                <button onClick={() => openModal()} className="bg-blue-600 hover:bg-blue-700 text-white font-bold px-4 py-2 rounded-lg text-sm flex items-center gap-1 transition-colors shadow-sm">
                  <FeatherIcon name="plus" className="w-4 h-4"/> 신규 요청
                </button>
              )}
            </div>
          </header>

          <main className="flex-1 overflow-hidden relative">
            {currentMenu === 'list' && <ListView events={filteredEvents} sysConfig={sysConfig} onEdit={openModal} />}
            {currentMenu === 'approval' && (
              isApprovalAuthed 
                ? <ApprovalView events={filteredEvents} onApprove={handleBulkApprove} /> 
                : <PasswordPrompt onAuth={() => setIsApprovalAuthed(true)} />
            )}
            {currentMenu === 'calendar' && <TimelineView events={filteredEvents} actualEvents={actualEvents} sysConfig={sysConfig} onEventClick={openModal} />}
          </main>
        </div>

        {isModalOpen && (
          <EventModal 
            eventData={editTarget} 
            events={events} // 실시간 중복 체크용
            sysConfig={sysConfig} 
            onClose={closeModal} 
            onSave={handleSave} 
            onGoToCalendar={() => { closeModal(); setCurrentMenu('calendar'); }}
          />
        )}
      </div>
    );
  }

  // --- [뷰 컴포넌트: 1. 편성 리스트] ---
  
  // 배너별 색상/디자인 매핑 함수
  const getBannerBadgeStyle = (bannerType) => {
    switch (bannerType) {
      case '미니EPG': return 'bg-blue-100 text-blue-700 border-blue-200';
      case '편성표 배너': return 'bg-purple-100 text-purple-700 border-purple-200';
      case 'WingUI 배너': return 'bg-indigo-100 text-indigo-700 border-indigo-200';
      case '일반채널 배너트리거': 
      case '가이드채널 배너트리거': return 'bg-teal-100 text-teal-700 border-teal-200';
      default: return 'bg-gray-100 text-gray-700 border-gray-200';
    }
  };

  // --- [유틸리티 함수 추가] ---
  // 날짜 문자열에서 시간(T00:00...) 제거하여 YYYY-MM-DD 만 반환
  const formatDateOnly = (dateString) => {
    if (!dateString) return '-';
    return dateString.split('T')[0];
  };

  // --- [뷰 컴포넌트: 1. 편성 리스트 (가독성 개선)] ---
  const ListView = ({ events, sysConfig, onEdit }) => {
    return (
      <div className="h-full overflow-y-auto p-6 bg-gray-50">
        <div className="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden flex flex-col">
          <div className="overflow-x-auto">
            <table className="w-full text-left text-sm min-w-[1200px]">
              <thead className="bg-gray-50 border-b border-gray-200 text-gray-600 font-bold sticky top-0 z-20">
                <tr>
                  <th className="p-3 w-16 text-center">상태</th>
                  <th className="p-3 min-w-[200px]">이벤트명</th>
                  <th className="p-3 min-w-[140px]">배너유형</th>
                  <th className="p-3 w-44 text-center">요청기간</th>
                  <th className="p-3 min-w-[200px]">대상채널 상세</th>
                  <th className="p-3 w-32">랜딩유형</th>
                  <th className="p-3 min-w-[150px]">랜딩 세부내용</th>
                  <th className="p-3 w-20 text-center">담당자</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-gray-100">
                {events.length === 0 ? <tr><td colSpan="8" className="p-8 text-center text-gray-500">조회된 데이터가 없습니다.</td></tr> : null}
                {events.map(e => {
                  const isReq = e.status === 'request';
                  const badgeStyle = getBannerBadgeStyle(e.bannerType);
                  return (
                    <tr key={e.id} onClick={() => onEdit(e)} className={`hover:bg-blue-50/50 cursor-pointer transition-colors ${isReq ? 'bg-white' : 'bg-gray-50/40'}`}>
                      {/* 상태 (줄바꿈 방지) */}
                      <td className="p-3 text-center align-middle whitespace-nowrap">
                        <span className={`inline-block px-2 py-1 rounded text-xs font-bold ${isReq ? 'bg-orange-50 text-orange-600 border border-orange-200' : 'bg-green-50 text-green-600 border border-green-200'}`}>
                          {isReq ? '대기' : '승인'}
                        </span>
                      </td>
                      <td className="p-3 font-bold text-gray-800 align-middle"><div className="truncate max-w-[250px]" title={e.title}>{e.title}</div></td>
                      <td className="p-3 align-middle"><span className={`px-2 py-1 rounded text-[11px] font-bold border ${badgeStyle} whitespace-nowrap`}>{e.bannerType}</span></td>
                      {/* 요청기간 (시간 제거) */}
                      <td className="p-3 text-gray-600 text-[11px] align-middle text-center whitespace-nowrap font-mono tracking-tight">
                        {formatDateOnly(e.start)} <span className="text-gray-400 font-bold mx-0.5">~</span> {formatDateOnly(e.end)}
                      </td>
                      <td className="p-3 text-gray-600 text-xs align-middle">
                        {e.targetChannel || e.targetProgram ? <div className="line-clamp-2 w-full max-w-[300px]" title={e.targetChannel || e.targetProgram}>{e.targetChannel || e.targetProgram}</div> : <span className="text-gray-400">-</span>}
                      </td>
                      <td className="p-3 text-gray-600 text-xs align-middle whitespace-nowrap">{e.landingType || '-'}</td>
                      <td className="p-3 text-gray-600 text-xs font-mono align-middle"><div className="truncate max-w-[200px]" title={e.landingDetail}>{e.landingDetail || '-'}</div></td>
                      <td className="p-3 text-gray-800 text-xs font-bold text-center align-middle">{e.manager}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    );
  };

  // --- [뷰 컴포넌트: 2. 승인 관리 (선택 버그 및 상세 뷰 개선)] ---
  const ApprovalView = ({ events, onApprove, onEdit }) => {
    const pendingEvents = events.filter(e => e.status === 'request');
    const [selected, setSelected] = React.useState([]);
    const toggleSelect = (id) => setSelected(prev => prev.includes(id) ? prev.filter(item => item !== id) : [...prev, id]);
    const selectAll = () => setSelected(selected.length === pendingEvents.length ? [] : pendingEvents.map(e => e.id));

    return (
      <div className="h-full flex flex-col p-6 bg-gray-50">
        <div className="mb-4 flex justify-between items-end">
          <h3 className="text-lg font-bold text-gray-800">승인 대기 목록</h3>
          <button onClick={() => onApprove(selected)} disabled={selected.length === 0} className="bg-green-600 hover:bg-green-700 disabled:bg-gray-300 text-white font-bold px-6 py-2.5 rounded-lg text-sm flex items-center gap-2 shadow-sm">
            <FeatherIcon name="check" className="w-4 h-4"/> 선택 항목 승인 ({selected.length})
          </button>
        </div>
        <div className="bg-white border border-gray-200 rounded-xl flex-1 overflow-y-auto shadow-sm">
          <table className="w-full text-left text-sm">
            <thead className="bg-gray-50 border-b border-gray-200 sticky top-0 z-10">
              <tr>
                <th className="p-4 w-12 text-center align-middle"><input type="checkbox" onChange={selectAll} checked={selected.length > 0 && selected.length === pendingEvents.length} className="w-4 h-4 rounded text-blue-600 cursor-pointer"/></th>
                <th className="p-4">이벤트명 (클릭하여 상세 보기)</th>
                <th className="p-4 w-64 text-center">요청기간</th>
              </tr>
            </thead>
            <tbody className="divide-y divide-gray-100">
              {pendingEvents.length === 0 && <tr><td colSpan="3" className="p-12 text-center text-gray-500">대기 중인 항목이 없습니다.</td></tr>}
              {pendingEvents.map(e => (
                <tr key={e.id} className={`hover:bg-blue-50 transition-colors ${selected.includes(e.id) ? 'bg-blue-50/30' : ''}`}>
                  {/* 체크박스 영역: 클릭 시 선택 토글만 됨 */}
                  <td className="p-4 text-center cursor-pointer align-middle" onClick={() => toggleSelect(e.id)}>
                    <input type="checkbox" checked={selected.includes(e.id)} onChange={() => toggleSelect(e.id)} onClick={(ev)=>ev.stopPropagation()} className="w-4 h-4 cursor-pointer"/>
                  </td>
                  {/* 데이터 영역: 클릭 시 모달 열림 */}
                  <td className="p-4 cursor-pointer align-middle" onClick={() => onEdit(e)}>
                    <div className="font-bold text-gray-800 flex items-center gap-2">
                      {e.title} <span className="bg-gray-100 px-2 py-1 rounded text-[11px] font-normal text-gray-600 border border-gray-200">{e.bannerType}</span>
                    </div>
                  </td>
                  <td className="p-4 text-gray-600 cursor-pointer align-middle text-center font-mono text-xs tracking-tight" onClick={() => onEdit(e)}>
                    {formatDateOnly(e.start)} ~ {formatDateOnly(e.end)}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    );
  };

  // --- [뷰 컴포넌트: 4. 편성 팝업 모달 (가독성 및 랜딩 기능 고도화)] ---
  const EventModal = ({ eventData, events, sysConfig, onClose, onSave, onGoToCalendar }) => {
    const isReadOnly = eventData && eventData.status === 'approved';
    const [form, setForm] = React.useState(eventData || {
      gubun: '신규', title: '', manager: '', bannerType: sysConfig.bannerTypes[0] || '미니EPG', 
      epgTargetType: 'channel', // channel OR program
      targetChannel: '', targetProgram: '', targetSTB: '전체',
      landingType: sysConfig.landingTypes[0] || '메뉴 바로가기', 
      landingDepth1: '', landingDepth2: '', landingDetail: '', 
      jiraLink: '', start: '', end: '', note: ''
    });
    
    const [overlapWarning, setOverlapWarning] = React.useState(null);
    const [showChannelNumber, setShowChannelNumber] = React.useState(true); // 채널 번호 노출 토글
    const needsTargeting = ['미니EPG', '가이드채널 배너트리거', '일반채널 배너트리거'].includes(form.bannerType);

    // 랜딩 1-Depth 추출 (중복 제거)
    const availableLandingDepth1 = React.useMemo(() => {
      if (!sysConfig.landingDetails) return [];
      const d1 = sysConfig.landingDetails.filter(l => l['랜딩 유형'] === '메뉴 바로가기').map(l => l['1Depth']);
      return [...new Set(d1)].filter(Boolean);
    }, [sysConfig.landingDetails]);

    // 선택된 1-Depth에 따른 2-Depth 및 URL 매핑
    const availableLandingDepth2 = React.useMemo(() => {
      if (!sysConfig.landingDetails || !form.landingDepth1) return [];
      return sysConfig.landingDetails.filter(l => l['랜딩 유형'] === '메뉴 바로가기' && l['1Depth'] === form.landingDepth1);
    }, [sysConfig.landingDetails, form.landingDepth1]);

    // 채널 리스트 정제 (번호 가리기 옵션 반영)
    const advancedChannelOptions = React.useMemo(() => {
      if (!sysConfig.channelMap) return [];
      const standaloneNumbers = [0, 1, 52, 70, 71, 88, 974, 982, 986, 987, 988, 989];
      let standalone = [], terrestrial = [], others = [];

      Object.entries(sysConfig.channelMap).forEach(([groupName, channels]) => {
        if (/(성인|교육|공공|종교)/.test(groupName)) return;
        const isTerrestrial = groupName.includes("지상파") || groupName.includes("종편");
        let odds = [], evens = [];

        channels.forEach(ch => {
          const num = parseInt(ch.num, 10);
          // 정규식으로 [XX번] 부분을 지우거나 살리는 로직
          const displayCh = showChannelNumber ? ch.fullName : ch.fullName.replace(/\[\d+번\]\s*/, '');
          
          if (standaloneNumbers.includes(num)) {
            standalone.push(`[단독선택] ${displayCh}`);
          } else if (isTerrestrial) {
            terrestrial.push(`[${groupName}] ${displayCh}`);
          } else {
            if (num % 2 !== 0) odds.push(num);
            else evens.push(num);
          }
        });

        if (!isTerrestrial) {
          odds.sort((a,b) => a - b); evens.sort((a,b) => a - b);
          if (odds.length > 0) others.push(`${groupName} 홀수 (${odds.join(', ')})`);
          if (evens.length > 0) others.push(`${groupName} 짝수 (${evens.join(', ')})`);
        }
      });
      return [...standalone, ...terrestrial, ...others];
    }, [sysConfig.channelMap, showChannelNumber]);

    // 입력 핸들러
    const handleChange = (e) => {
      const { name, value } = e.target;
      setForm(prev => {
        const next = { ...prev, [name]: value };
        // 메뉴 바로가기 뎁스 연동 처리
        if (name === 'landingDepth1') { next.landingDepth2 = ''; next.landingDetail = ''; }
        if (name === 'landingDepth2') {
          const selectedObj = availableLandingDepth2.find(l => l['2Depth'] === value);
          next.landingDetail = selectedObj ? selectedObj['URL'] : '';
        }
        return next;
      });
    };

    const handleChannelCheck = (option) => {
      if (isReadOnly) return;
      let currentList = form.targetChannel ? form.targetChannel.split(' / ') : [];
      if (currentList.includes(option)) currentList = currentList.filter(item => item !== option);
      else currentList.push(option);
      setForm(prev => ({ ...prev, targetChannel: currentList.join(' / ') }));
    };

    return (
      <div className="fixed inset-0 z-50 flex items-center justify-center modal-overlay bg-gray-900/60 backdrop-blur-sm p-4">
        <div className="bg-white rounded-2xl shadow-2xl w-full max-w-4xl overflow-hidden flex flex-col modal-content max-h-[95vh]">
          
          {/* Header */}
          <div className={`px-6 py-4 border-b flex justify-between items-center text-white ${isReadOnly ? 'bg-gray-600' : 'bg-[#4f3df6]'}`}>
            <h3 className="font-bold text-lg flex items-center gap-2">
              <FeatherIcon name={isReadOnly ? 'file-text' : 'edit'} className="w-5 h-5"/>
              {isReadOnly ? '프로모션 상세 (읽기 전용)' : (eventData ? '프로모션 수정' : '신규 프로모션 편성')}
            </h3>
            <button onClick={onClose} className="text-white/80 hover:text-white transition-colors"><FeatherIcon name="x" className="w-6 h-6"/></button>
          </div>

          <form id="modalForm" onSubmit={(e) => { e.preventDefault(); onSave(form); }} className="p-6 overflow-y-auto flex-1 space-y-6">
            
            {/* Section 1: 기본 정보 (강조) */}
            <section className="bg-gray-50/50 border border-gray-200 rounded-xl p-5 shadow-sm relative">
              <div className="absolute top-0 left-0 w-1.5 h-full bg-[#4f3df6] rounded-l-xl"></div>
              <h4 className="text-sm font-bold text-gray-800 mb-4 flex items-center gap-2"><FeatherIcon name="info" className="w-4 h-4 text-[#4f3df6]"/> 기본 정보</h4>
              <div className="grid grid-cols-4 gap-4">
                <div>
                  <label className="block text-xs font-bold text-gray-700 mb-1.5">구분</label>
                  {isReadOnly ? <input value={form.gubun} readOnly className="w-full border rounded-lg p-2 text-sm bg-gray-100"/>
                  : <select name="gubun" value={form.gubun} onChange={handleChange} className="w-full border border-gray-300 rounded-lg p-2 text-sm outline-none focus:ring-2 focus:ring-[#4f3df6]"><option>신규</option><option>재편성</option><option>수정</option></select>}
                </div>
                <div className="col-span-2">
                  <label className="block text-xs font-bold text-gray-700 mb-1.5">프로모션(이벤트)명</label>
                  <input type="text" name="title" value={form.title} onChange={handleChange} readOnly={isReadOnly} required className="w-full border border-gray-300 rounded-lg p-2 text-sm outline-none focus:ring-2 focus:ring-[#4f3df6]"/>
                </div>
                <div>
                  <label className="block text-xs font-bold text-gray-700 mb-1.5">담당자</label>
                  <input type="text" name="manager" value={form.manager} onChange={handleChange} readOnly={isReadOnly} required className="w-full border border-gray-300 rounded-lg p-2 text-sm outline-none focus:ring-2 focus:ring-[#4f3df6]"/>
                </div>
                
                <div>
                  <label className="block text-xs font-bold text-gray-700 mb-1.5">배너 영역</label>
                  {isReadOnly ? <input value={form.bannerType} readOnly className="w-full border rounded-lg p-2 text-sm bg-gray-100"/>
                  : <select name="bannerType" value={form.bannerType} onChange={handleChange} className="w-full border border-gray-300 rounded-lg p-2 text-sm outline-none focus:ring-2 focus:ring-[#4f3df6]">{sysConfig.bannerTypes.map(b => <option key={b} value={b}>{b}</option>)}</select>}
                </div>
                <div>
                  <label className="block text-xs font-bold text-gray-700 mb-1.5">대상 STB</label>
                  <input type="text" name="targetSTB" value={form.targetSTB} onChange={handleChange} readOnly={isReadOnly} className="w-full border border-gray-300 rounded-lg p-2 text-sm outline-none"/>
                </div>
                <div>
                  <label className="block text-xs font-bold text-gray-700 mb-1.5">요청 시작일</label>
                  <input type="date" name="start" value={form.start ? formatDateOnly(form.start) : ''} onChange={handleChange} readOnly={isReadOnly} required className="w-full border border-gray-300 rounded-lg p-2 text-sm outline-none focus:ring-2 focus:ring-[#4f3df6]"/>
                </div>
                <div>
                  <label className="block text-xs font-bold text-gray-700 mb-1.5">요청 종료일</label>
                  <input type="date" name="end" value={form.end ? formatDateOnly(form.end) : ''} min={form.start ? formatDateOnly(form.start) : ''} onChange={handleChange} readOnly={isReadOnly} required className="w-full border border-gray-300 rounded-lg p-2 text-sm outline-none focus:ring-2 focus:ring-[#4f3df6]"/>
                </div>
              </div>
            </section>

            {/* Section 2: 상세 편성 영역 설정 */}
            {needsTargeting && (
              <section className="bg-white border border-gray-200 rounded-xl p-5 shadow-sm">
                <div className="flex justify-between items-center mb-4">
                  <h4 className="text-sm font-bold text-gray-800 flex items-center gap-2"><FeatherIcon name="target" className="w-4 h-4 text-orange-500"/> 상세 편성 대상</h4>
                  
                  {/* 채널/프로그램 토글 UI */}
                  {!isReadOnly && (
                    <div className="flex bg-gray-100 rounded-lg p-1 border border-gray-200">
                      <button type="button" onClick={() => setForm(p => ({...p, epgTargetType: 'channel'}))} className={`px-3 py-1 rounded text-xs font-bold transition-colors ${form.epgTargetType === 'channel' ? 'bg-white text-orange-600 shadow-sm' : 'text-gray-500'}`}>채널 단위 편성</button>
                      <button type="button" onClick={() => setForm(p => ({...p, epgTargetType: 'program'}))} className={`px-3 py-1 rounded text-xs font-bold transition-colors ${form.epgTargetType === 'program' ? 'bg-white text-orange-600 shadow-sm' : 'text-gray-500'}`}>프로그램 단위 편성</button>
                    </div>
                  )}
                </div>

                {form.epgTargetType === 'program' ? (
                  <div className="bg-orange-50/30 border border-orange-100 rounded-lg p-4">
                    <label className="block text-xs font-bold text-gray-700 mb-1.5">대상 프로그램명 (또는 시리즈명)</label>
                    <input type="text" name="targetProgram" value={form.targetProgram} onChange={handleChange} readOnly={isReadOnly} placeholder="예: 런닝맨, 모범택시 등" className="w-full border border-gray-300 rounded-lg p-2 text-sm outline-none focus:ring-2 focus:ring-orange-500"/>
                  </div>
                ) : (
                  <div className="bg-blue-50/30 border border-blue-100 rounded-lg p-4">
                    <div className="flex justify-between items-end mb-2">
                      <label className="block text-xs font-bold text-blue-800">대상 채널 선택 (복수 선택 가능)</label>
                      <label className="flex items-center gap-1.5 cursor-pointer">
                        <input type="checkbox" checked={showChannelNumber} onChange={(e) => setShowChannelNumber(e.target.checked)} className="w-3.5 h-3.5 text-blue-600 rounded"/>
                        <span className="text-[11px] font-bold text-gray-500">채널 번호 함께 보기</span>
                      </label>
                    </div>
                    <div className="bg-white border border-gray-200 rounded-lg p-3 h-48 overflow-y-auto grid grid-cols-2 lg:grid-cols-3 gap-2">
                      {advancedChannelOptions.map(option => {
                        const isChecked = (form.targetChannel || '').includes(option);
                        return (
                          <label key={option} className={`flex items-start gap-2 p-2 rounded cursor-pointer transition-colors border ${isChecked ? 'bg-blue-50 border-blue-200' : 'border-transparent hover:bg-gray-50'}`}>
                            <input type="checkbox" checked={isChecked} onChange={() => handleChannelCheck(option)} disabled={isReadOnly} className="mt-0.5 w-4 h-4 text-blue-600 rounded cursor-pointer"/>
                            <span className="text-xs text-gray-700 font-medium leading-tight">{option}</span>
                          </label>
                        );
                      })}
                    </div>
                  </div>
                )}
              </section>
            )}

            {/* Section 3: 랜딩 및 부가 정보 */}
            <section className="bg-white border border-gray-200 rounded-xl p-5 shadow-sm">
               <h4 className="text-sm font-bold text-gray-800 mb-4 flex items-center gap-2"><FeatherIcon name="link" className="w-4 h-4 text-green-600"/> 랜딩 및 부가 정보</h4>
               <div className="grid grid-cols-3 gap-4">
                <div>
                  <label className="block text-xs font-bold text-gray-700 mb-1.5">랜딩 유형</label>
                  {isReadOnly ? <input value={form.landingType} readOnly className="w-full border rounded-lg p-2 text-sm bg-gray-100"/>
                  : <select name="landingType" value={form.landingType} onChange={handleChange} className="w-full border border-gray-300 rounded-lg p-2 text-sm outline-none focus:ring-2 focus:ring-green-500">{sysConfig.landingTypes.map(l => <option key={l} value={l}>{l}</option>)}</select>}
                </div>
                
                <div className="col-span-2 grid grid-cols-2 gap-2">
                  {/* 랜딩 유형이 '메뉴 바로가기'일 때 2-Depth 연동 드롭다운 노출 */}
                  {form.landingType === '메뉴 바로가기' ? (
                    <>
                      <div>
                        <label className="block text-xs font-bold text-gray-700 mb-1.5">1-Depth</label>
                        {isReadOnly ? <input value={form.landingDepth1} readOnly className="w-full border rounded-lg p-2 text-sm bg-gray-100"/>
                        : <select name="landingDepth1" value={form.landingDepth1} onChange={handleChange} className="w-full border border-gray-300 rounded-lg p-2 text-sm outline-none"><option value="">선택</option>{availableLandingDepth1.map(d => <option key={d} value={d}>{d}</option>)}</select>}
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-gray-700 mb-1.5">2-Depth (최종 목적지)</label>
                        {isReadOnly ? <input value={form.landingDepth2} readOnly className="w-full border rounded-lg p-2 text-sm bg-gray-100"/>
                        : <select name="landingDepth2" value={form.landingDepth2} onChange={handleChange} disabled={!form.landingDepth1} className="w-full border border-gray-300 rounded-lg p-2 text-sm outline-none"><option value="">선택</option>{availableLandingDepth2.map(d => <option key={d['2Depth']} value={d['2Depth']}>{d['2Depth']}</option>)}</select>}
                      </div>
                    </>
                  ) : (
                    <div className="col-span-2">
                      <label className="block text-xs font-bold text-gray-700 mb-1.5">랜딩 세부 내용 (ID / URL)</label>
                      <input type="text" name="landingDetail" value={form.landingDetail} onChange={handleChange} readOnly={isReadOnly || (form.landingType === '메뉴 바로가기')} placeholder="메뉴 연동 시 자동 입력됨" className="w-full border border-gray-300 rounded-lg p-2 text-sm outline-none focus:ring-2 focus:ring-green-500 bg-gray-50"/>
                    </div>
                  )}
                </div>
                
                <div className="col-span-3 mt-2">
                  <label className="block text-xs font-bold text-gray-700 mb-1.5 flex items-center gap-1"><FeatherIcon name="trello" className="w-3 h-3 text-blue-500"/> 관련 Jira 링크 (또는 이미지 URL)</label>
                  <input type="url" name="jiraLink" value={form.jiraLink} onChange={handleChange} readOnly={isReadOnly} placeholder="https://jira.skbroadband.com/browse/..." className="w-full border border-gray-300 rounded-lg p-2 text-sm outline-none focus:ring-2 focus:ring-blue-500"/>
                </div>

                <div className="col-span-3">
                  <label className="block text-xs font-bold text-gray-700 mb-1.5">비고 사항</label>
                  <input type="text" name="note" value={form.note} onChange={handleChange} readOnly={isReadOnly} className="w-full border border-gray-300 rounded-lg p-2 text-sm outline-none"/>
                </div>
              </div>
            </section>
          </form>

          {/* 하단 제어 영역 */}
          <div className="px-6 py-4 border-t bg-gray-50 flex justify-end gap-3 rounded-b-2xl">
            <button type="button" onClick={onClose} className="px-5 py-2 rounded-lg text-sm font-bold text-gray-600 bg-white border border-gray-300 hover:bg-gray-100 transition-colors">닫기</button>
            
            {/* 👇 여기부터 교체 👇 */}
            {!isReadOnly && (
              overlapWarning?.type === 'block' ? (
                <button type="button" onClick={onGoToCalendar} className="px-6 py-2 rounded-lg text-sm font-bold text-red-600 bg-red-50 border border-red-200 hover:bg-red-100 transition-colors flex items-center gap-2 shadow-sm">
                  <FeatherIcon name="calendar" className="w-4 h-4"/> 빈 일정 찾기
                </button>
              ) : (
                <button type="submit" form="modalForm" className="px-6 py-2 rounded-lg text-sm font-bold text-white bg-[#4f3df6] hover:bg-indigo-700 transition-colors flex items-center gap-2 shadow-sm">
                  <FeatherIcon name="save" className="w-4 h-4"/> {overlapWarning?.type === 'info' ? '인지 후 저장' : '저장 및 요청'}
                </button>
              )
            )}
            {/* 👆 여기까지 교체 👆 */}
          </div>
        </div>
      </div>
    );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
