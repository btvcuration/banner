<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B tv 실시간 인벤토리 편성 Admin 시스템</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">

  <div id="root"></div>

  <script type="text/babel">
    const API_URL = "https://royal-flower-ea31.alcheminos.workers.dev/";

    // B tv 시스템 설정 데이터 (기존 GAS sysConfig 역할)
    const SYS_CONFIG = {
      categories: {
        "실시간 채널 편성": ["미니EPG", "가이드채널 배너트리거", "일반채널 배너트리거"],
        "영역 편성": ["편성표 배너", "WingUI 배너"]
      },
      landingTypes: ["메뉴 바로가기 (1 depth)", "실시간 채널", "미디어 에이전트 연결", "구매하기 Half UI", "브라우저 팝업", "VOD 시놉시스"],
      channelGroups: ["[지상파] 전체", "[종편] 전체", "영화 홀수", "영화 짝수", "스포츠"], // 실제 B tv 그룹으로 수정 필요
      singleChannels: ["0", "1", "52", "974", "982", "986"] // 단독 예외 채널들
    };

    function App() {
      const [activeTab, setActiveTab] = React.useState('requests');
      const [requests, setRequests] = React.useState([]);
      const [approved, setApproved] = React.useState([]);
      const [schedules, setSchedules] = React.useState([]);
      const [loading, setLoading] = React.useState(false);

      // --- [요청 폼 상태(State) 관리] ---
      const initialFormState = {
        gubun: '신규', manager: '', category: '', bannerType: '', 
        epgTargetType: 'channel', targetChannels: [], targetDetail: '', oapTitle: '', 
        eventName: '', startDate: '', endDate: '', landingType: '메뉴 바로가기 (1 depth)', 
        landingDetail: '', jiraLink: ''
      };
      const [formData, setFormData] = React.useState(initialFormState);

      const fetchData = async (action, setData) => {
        setLoading(true);
        try {
          const response = await fetch(`${API_URL}?action=${action}`);
          const json = await response.json();
          setData(json);
        } catch (error) {
          alert(`데이터 로드 실패: ${error.toString()}`);
        }
        setLoading(false);
      };

      React.useEffect(() => {
        if (activeTab === 'requests') fetchData('getRequests', setRequests);
        if (activeTab === 'approved') fetchData('getApproved', setApproved);
        if (activeTab === 'schedules') fetchData('getSchedules', setSchedules);
      }, [activeTab]);

      // --- [폼 입력 핸들러] ---
      const handleChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => {
          const newData = { ...prev, [name]: value };
          // 대분류가 바뀌면 배너유형 초기화
          if (name === 'category') newData.bannerType = ''; 
          // 시작일이 바뀌면 종료일도 기본 세팅 (편의성)
          if (name === 'startDate' && !prev.endDate) newData.endDate = value; 
          return newData;
        });
      };

      const handleCheckboxChange = (e) => {
        const { value, checked } = e.target;
        setFormData(prev => {
          const updatedChannels = checked 
            ? [...prev.targetChannels, value] 
            : prev.targetChannels.filter(ch => ch !== value);
          return { ...prev, targetChannels: updatedChannels };
        });
      };

      // --- [신규 요청 제출 API 호출] ---
      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);

        // 타겟팅 상세 문자열 조립
        let finalTargetDetail = formData.targetDetail;
        const isEpg = formData.bannerType === '미니EPG' || formData.bannerType === '일반채널 배너트리거';
        
        if (isEpg) {
          if (formData.epgTargetType === 'channel' || formData.epgTargetType === 'singleChannel') {
            finalTargetDetail = formData.targetChannels.join(' / ');
          }
        }

        const payload = {
          구분: formData.gubun,
          담당자: formData.manager,
          이벤트명: formData.eventName,
          요청시작일: formData.startDate,
          요청종료일: formData.endDate,
          편성영역: formData.bannerType,
          배너유형: formData.bannerType, // DB 스키마 대응
          대상채널_상세: finalTargetDetail,
          랜딩유형: formData.landingType,
          랜딩세부내용: formData.landingDetail,
          이미지_Jira링크: formData.jiraLink,
          비고: formData.oapTitle, // OAP 타이틀은 비고로 맵핑
          상태: '신규(요청)'
        };

        try {
          const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'addRequest', payload: payload })
          });
          const result = await response.json();
          if (result.status === 'success') {
            alert('✅ 신규 편성 요청이 Admin DB에 등록되었습니다.');
            setFormData(initialFormState); // 폼 초기화
            fetchData('getRequests', setRequests); // 목록 새로고침
          }
        } catch (error) {
          alert('요청 등록 중 오류 발생: ' + error.toString());
        }
        setLoading(false);
      };

      // --- [승인 처리 API 호출] ---
      const handleApprove = async (reqItem) => {
        if (!window.confirm(`[${reqItem.이벤트명}] 편성을 승인하시겠습니까?`)) return;
        setLoading(true);
        try {
          const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action: 'approveRequest',
              payload: { ...reqItem, 상태: '승인완료' }
            })
          });
          const result = await response.json();
          if (result.status === 'success') {
            alert('✅ 마스터 DB로 이관되었습니다.');
            fetchData('getRequests', setRequests);
          }
        } catch (error) {
          alert('승인 처리 중 오류 발생: ' + error.toString());
        }
        setLoading(false);
      };

      return (
        <div class="p-6 max-w-screen-2xl mx-auto font-sans">
          <div class="flex justify-between items-center border-b-2 border-gray-900 pb-4 mb-6">
            <h1 class="text-2xl font-black text-gray-900">📺 B tv 편성 Admin 시스템 (통합 관제)</h1>
            {loading && <span class="text-blue-600 font-bold animate-pulse">🔄 시스템 통신 중...</span>}
          </div>

          <div class="flex gap-2 mb-6">
            <button onClick={() => setActiveTab('requests')} class={`px-5 py-2.5 font-bold rounded text-sm transition ${activeTab === 'requests' ? 'bg-blue-600 text-white shadow-md' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}`}>📥 신규 편성 데스크</button>
            <button onClick={() => setActiveTab('approved')} class={`px-5 py-2.5 font-bold rounded text-sm transition ${activeTab === 'approved' ? 'bg-green-600 text-white shadow-md' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}`}>📋 마스터 승인 원장</button>
            <button onClick={() => setActiveTab('schedules')} class={`px-5 py-2.5 font-bold rounded text-sm transition ${activeTab === 'schedules' ? 'bg-red-600 text-white shadow-md' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}`}>📅 실편성 캘린더 엔진</button>
          </div>

          {activeTab === 'requests' && (
            <div class="flex flex-col xl:flex-row gap-6">
              
              {/* 왼쪽: 편성 요청 폼 (기존 사이드바 UI 대체) */}
              <div class="w-full xl:w-1/3 bg-white p-5 rounded-lg shadow-md border-t-4 border-blue-500">
                <h3 class="text-lg font-bold text-gray-800 mb-4 pb-2 border-b">📝 편성 요청서 작성</h3>
                <form onSubmit={handleSubmit} class="space-y-4">
                  
                  <div class="flex gap-4">
                    <div class="flex-1">
                      <label class="block text-xs font-bold text-gray-600 mb-1">구분 *</label>
                      <select name="gubun" value={formData.gubun} onChange={handleChange} class="w-full p-2 border rounded text-sm focus:ring-2 focus:ring-blue-400">
                        <option value="신규">신규</option><option value="재편성">재편성</option>
                      </select>
                    </div>
                    <div class="flex-1">
                      <label class="block text-xs font-bold text-gray-600 mb-1">담당자 *</label>
                      <input type="text" name="manager" value={formData.manager} onChange={handleChange} required class="w-full p-2 border rounded text-sm" placeholder="이름 입력"/>
                    </div>
                  </div>

                  <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1">편성 대분류 *</label>
                    <select name="category" value={formData.category} onChange={handleChange} required class="w-full p-2 border rounded text-sm">
                      <option value="">-- 대분류 선택 --</option>
                      {Object.keys(SYS_CONFIG.categories).map(cat => <option key={cat} value={cat}>{cat}</option>)}
                    </select>
                  </div>

                  <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1">배너 유형 *</label>
                    <select name="bannerType" value={formData.bannerType} onChange={handleChange} required disabled={!formData.category} class="w-full p-2 border rounded text-sm bg-gray-50 disabled:bg-gray-200">
                      <option value="">-- 배너 유형 선택 --</option>
                      {formData.category && SYS_CONFIG.categories[formData.category].map(type => <option key={type} value={type}>{type}</option>)}
                    </select>
                  </div>

                  {/* 조건부 렌더링: 미니EPG & 배너트리거 */}
                  {(formData.bannerType === '미니EPG' || formData.bannerType === '일반채널 배너트리거') && (
                    <div class="p-3 bg-gray-50 border rounded">
                      <label class="block text-xs font-bold text-gray-600 mb-2">미니 EPG / 일반채널 편성 대상</label>
                      <div class="flex gap-2 mb-3 bg-gray-200 p-1 rounded">
                        <label class={`flex-1 text-center py-1 rounded text-xs font-bold cursor-pointer transition ${formData.epgTargetType === 'channel' ? 'bg-white text-blue-600 shadow' : 'text-gray-500'}`}>
                          <input type="radio" name="epgTargetType" value="channel" onChange={handleChange} checked={formData.epgTargetType === 'channel'} class="hidden"/> 그룹 채널
                        </label>
                        {formData.bannerType !== '미니EPG' && (
                          <label class={`flex-1 text-center py-1 rounded text-xs font-bold cursor-pointer transition ${formData.epgTargetType === 'singleChannel' ? 'bg-white text-blue-600 shadow' : 'text-gray-500'}`}>
                            <input type="radio" name="epgTargetType" value="singleChannel" onChange={handleChange} checked={formData.epgTargetType === 'singleChannel'} class="hidden"/> 단일 채널
                          </label>
                        )}
                        <label class={`flex-1 text-center py-1 rounded text-xs font-bold cursor-pointer transition ${formData.epgTargetType === 'program' ? 'bg-white text-blue-600 shadow' : 'text-gray-500'}`}>
                          <input type="radio" name="epgTargetType" value="program" onChange={handleChange} checked={formData.epgTargetType === 'program'} class="hidden"/> 프로그램
                        </label>
                      </div>

                      {/* 하위 체크박스 렌더링 */}
                      {formData.epgTargetType === 'channel' && (
                        <div class="max-h-32 overflow-y-auto bg-white border p-2 rounded text-sm space-y-1">
                          {SYS_CONFIG.channelGroups.map(ch => (
                            <label key={ch} class="flex items-center gap-2 cursor-pointer text-gray-700">
                              <input type="checkbox" value={ch} checked={formData.targetChannels.includes(ch)} onChange={handleCheckboxChange} class="text-blue-600"/> {ch}
                            </label>
                          ))}
                        </div>
                      )}
                      {formData.epgTargetType === 'singleChannel' && (
                        <div class="max-h-32 overflow-y-auto bg-white border p-2 rounded text-sm space-y-1">
                          {SYS_CONFIG.singleChannels.map(ch => (
                            <label key={ch} class="flex items-center gap-2 cursor-pointer text-gray-700">
                              <input type="checkbox" value={ch} checked={formData.targetChannels.includes(ch)} onChange={handleCheckboxChange} class="text-blue-600"/> {ch}
                            </label>
                          ))}
                        </div>
                      )}
                      {formData.epgTargetType === 'program' && (
                        <input type="text" name="targetDetail" value={formData.targetDetail} onChange={handleChange} class="w-full p-2 border rounded text-sm" placeholder="프로그램명 정확히 기입"/>
                      )}
                    </div>
                  )}

                  {formData.bannerType === '가이드채널 배너트리거' && (
                    <div>
                      <label class="block text-xs font-bold text-gray-600 mb-1">OAP 타이틀명 *</label>
                      <input type="text" name="oapTitle" value={formData.oapTitle} onChange={handleChange} class="w-full p-2 border rounded text-sm" placeholder="예: OAP_여름특집_V1"/>
                    </div>
                  )}

                  <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1">이벤트 / 편성명 *</label>
                    <input type="text" name="eventName" value={formData.eventName} onChange={handleChange} required class="w-full p-2 border rounded text-sm" placeholder="예: 수요 1+1 무비쿠폰"/>
                  </div>

                  <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1">편성 기간 *</label>
                    <div class="flex gap-2 items-center">
                      <input type="date" name="startDate" value={formData.startDate} onChange={handleChange} required class="w-full p-2 border rounded text-sm text-gray-700"/>
                      <span class="text-gray-400">~</span>
                      <input type="date" name="endDate" value={formData.endDate} min={formData.startDate} onChange={handleChange} required class="w-full p-2 border rounded text-sm text-gray-700"/>
                    </div>
                  </div>

                  <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1">랜딩 유형 *</label>
                    <select name="landingType" value={formData.landingType} onChange={handleChange} class="w-full p-2 border rounded text-sm">
                      {SYS_CONFIG.landingTypes.map(type => <option key={type} value={type}>{type}</option>)}
                    </select>
                  </div>
                  <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1">랜딩 상세 정보</label>
                    <input type="text" name="landingDetail" value={formData.landingDetail} onChange={handleChange} class="w-full p-2 border rounded text-sm" placeholder="URL, 메뉴경로, CS ID 등 입력"/>
                  </div>

                  <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1">이미지 / Jira 링크</label>
                    <input type="text" name="jiraLink" value={formData.jiraLink} onChange={handleChange} class="w-full p-2 border rounded text-sm" placeholder="https://jira.skbroadband.com/..."/>
                  </div>

                  <button type="submit" disabled={loading} class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow transition disabled:bg-blue-300">
                    {loading ? '처리 중...' : '🚀 편성 요청 등록'}
                  </button>
                </form>
              </div>

              {/* 오른쪽: 요청 대기열 목록 */}
              <div class="w-full xl:w-2/3 bg-white rounded-lg shadow-md border-t-4 border-gray-400 overflow-hidden">
                <div class="p-4 bg-gray-50 border-b flex justify-between items-center">
                  <h3 class="text-lg font-bold text-gray-800">📋 대기 중인 신규 요청 현황</h3>
                  <span class="text-xs font-bold bg-blue-100 text-blue-800 px-2 py-1 rounded-full">{requests.filter(r => r.상태 === '신규(요청)').length}건</span>
                </div>
                <div class="overflow-x-auto p-4">
                  <table class="w-full text-sm text-left">
                    <thead class="bg-gray-100 text-gray-700 text-center font-bold">
                      <tr>
                        <th class="p-3 border">이벤트명</th><th class="p-3 border">배너유형</th><th class="p-3 border">요청기간</th>
                        <th class="p-3 border">담당자</th><th class="p-3 border">액션</th>
                      </tr>
                    </thead>
                    <tbody>
                      {requests.filter(r => r.상태 === '신규(요청)').map((req) => (
                        <tr key={req.요청ID} class="text-center border-b hover:bg-gray-50">
                          <td class="p-3 border text-left font-bold text-gray-900">{req.이벤트명}</td>
                          <td class="p-3 border text-gray-600">{req.배너유형}</td>
                          <td class="p-3 border font-mono text-xs">{req.요청시작일} ~ {req.요청종료일}</td>
                          <td class="p-3 border font-medium">{req.담당자}</td>
                          <td class="p-3 border">
                            <button onClick={() => handleApprove(req)} class="bg-green-600 hover:bg-green-700 text-white font-bold px-3 py-1.5 rounded text-xs shadow-sm transition">🟢 승인 이관</button>
                          </td>
                        </tr>
                      ))}
                      {requests.filter(r => r.상태 === '신규(요청)').length === 0 && (
                        <tr><td colSpan="5" class="p-12 text-center text-gray-400 font-medium">현재 대기 중인 요청이 없습니다.</td></tr>
                      )}
                    </tbody>
                  </table>
                </div>
              </div>

            </div>
          )}

          {/* 2. 승인 마스터 데이터 화면 (생략 가능, 이전 코드와 동일 구조) */}
          {activeTab === 'approved' && (
            <div class="bg-white p-5 rounded-lg shadow-md border-t-4 border-green-500">
               {/* 이전에 작성해드린 approved 화면 코드와 동일 */}
               <h3 class="text-lg font-bold text-gray-800 mb-4">✅ 마스터 승인 완료 데이터베이스</h3>
               <table class="w-full text-sm text-center">
                  <thead class="bg-green-600 text-white font-bold">
                    <tr><th class="p-3 border">이벤트명</th><th class="p-3 border">배너유형</th><th class="p-3 border">편성영역</th><th class="p-3 border">승인기간</th><th class="p-3 border">담당자</th></tr>
                  </thead>
                  <tbody>
                    {approved.map((app) => (
                      <tr key={app.승인ID} class="border-b hover:bg-gray-50">
                        <td class="p-3 border text-left font-bold">{app.이벤트명}</td><td class="p-3 border">{app.배너유형}</td><td class="p-3 border">{app.편성영역 || '-'}</td>
                        <td class="p-3 border font-mono">{app.승인시작일} ~ {app.승인종료일}</td><td class="p-3 border">{app.담당자}</td>
                      </tr>
                    ))}
                  </tbody>
               </table>
            </div>
          )}

          {/* 3. 실편성 타임라인 화면 */}
          {activeTab === 'schedules' && (
            <div class="bg-white p-5 rounded-lg shadow-md border-t-4 border-red-500">
              <h3 class="text-lg font-bold text-gray-800 mb-4">📅 일자별 실편성 분배 현황</h3>
              <p class="text-gray-500 mb-4 text-sm">추후 여기에 FullCalendar 연동 및 자동 스케줄링 API 트리거 버튼이 결합됩니다.</p>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
