<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>실시간 배너 편성 요청 시스템</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/feather-icons"></script>
  
  <style>
    body { font-family: 'Pretendard', 'Malgun Gothic', sans-serif; background-color: #f8f9fa; margin: 0; }
    .sidebar-item { transition: all 0.2s ease; }
    .sidebar-item.active { background-color: #fce8e6; color: #d93025; border-right: 3px solid #d93025; font-weight: 700; }
    .sidebar-item:hover:not(.active) { background-color: #f1f3f4; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .timeline-grid { background-size: 60px 100%; background-image: linear-gradient(to right, #f1f5f9 1px, transparent 1px); }
    .event-bar { transition: all 0.2s; }
    .event-bar:hover { filter: brightness(1.05); transform: translateY(-1px); z-index: 10; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-overlay { animation: fadeIn 0.2s ease-out forwards; }
    .modal-content { animation: slideUp 0.3s ease-out forwards; }
  </style>
</head>
<body class="text-gray-800 antialiased h-screen flex overflow-hidden">
  <div id="root" class="w-full h-full"></div>

  <script type="text/babel">
  const GAS_API_URL = "https://royal-flower-ea31.alcheminos.workers.dev/"; 
  const CF_SHEET_URL = "https://your-cloudflare-worker-url.workers.dev"; // TODO: 실제 클라우드플레어 워커 URL로 변경

  // [설정값 및 누락 변수 복구]
  const CONFIG = {
    bannerTypes: ['미니EPG', '일반채널 배너트리거', '홈배너', 'VOD 상세 배너'],
    landingTypes: ['메뉴 이동', 'VOD 재생', '프로모션 페이지', '외부 링크']
  };

  // [아이콘 컴포넌트 추가]
  const FeatherIcon = ({ name, className }) => {
    const svgString = feather.icons[name] ? feather.icons[name].toSvg({ class: className }) : '';
    return <span dangerouslySetInnerHTML={{ __html: svgString }} className="inline-flex items-center justify-center" />;
  };

  // --- [메인 애플리케이션] ---
  function App() {
    const [currentMenu, setCurrentMenu] = React.useState('list'); 
    const [events, setEvents] = React.useState([]); 
    const [filterType, setFilterType] = React.useState('전체');
    const [isApprovalAuthed, setIsApprovalAuthed] = React.useState(false);
    const [isModalOpen, setIsModalOpen] = React.useState(false);
    const [editTarget, setEditTarget] = React.useState(null); 
    
    // [신규] 클라우드플레어 시트 DB 상태 관리
    const [channelDB, setChannelDB] = React.useState({});
    const [channelGroups, setChannelGroups] = React.useState([]);

    // 1. [GAS 연동] 배너 요청 리스트 불러오기
    const loadData = async () => {
      try {
        const res = await fetch(`${GAS_API_URL}?action=getRequests`);
        const data = await res.json();
        setEvents(data.map(item => ({
          id: item.요청ID || Date.now().toString(),
          title: item.이벤트명,
          manager: item.담당자,
          bannerType: item.배너유형,
          targetGroup: item.편성그룹 || '',
          targetChannel: item.편성채널 || '',
          targetProgram: item.편성프로그램 || '',
          start: item.요청시작일,
          end: item.요청종료일,
          status: item.상태 === '승인완료' ? 'approved' : 'request',
        })));
      } catch(e) { 
        console.warn("GAS 데이터 로딩 실패, 샘플 데이터를 사용합니다.", e); 
      }
    };

    // 2. [CF 연동] 구글 시트 채널 인벤토리 불러오기
    const loadChannelData = async () => {
      try {
        const res = await fetch(CF_SHEET_URL);
        const rawData = await res.json(); 
        
        // rawData가 [["지상파/종편", "홈쇼핑", ...], ["[5번] SBS", "[2번] CJ ONSTYLE+", ...]] 형태라고 가정
        const db = {};
        if (rawData && rawData.length > 0) {
          const headers = rawData[0];
          headers.forEach(h => { if(h) db[h] = []; });
          
          for (let i = 1; i < rawData.length; i++) {
            headers.forEach((h, colIndex) => {
              const cellValue = rawData[i][colIndex];
              if (cellValue && h) {
                db[h].push(cellValue);
              }
            });
          }
          setChannelDB(db);
          setChannelGroups(Object.keys(db));
        }
      } catch (e) {
        console.warn("채널 데이터를 가져오는 중 오류 발생 (Worker URL 확인 필요)", e);
        // 테스트용 샘플 데이터 세팅
        setChannelDB({
          "지상파/종편": ["[5번] SBS", "[7번] KBS2", "[9번] KBS1", "[11번] MBC"],
          "영화": ["[70번] CATCH ON 1", "[71번] CATCH ON 2", "[72번] OCN Movies"]
        });
        setChannelGroups(["지상파/종편", "영화"]);
      }
    };

    React.useEffect(() => { 
      loadData(); 
      loadChannelData();
    }, []);

    const filteredEvents = events.filter(e => filterType === '전체' || e.bannerType === filterType);

    const openModal = (eventData = null) => {
      setEditTarget(eventData);
      setIsModalOpen(true);
    };
    
    const closeModal = () => {
      setIsModalOpen(false);
      setEditTarget(null);
    };

    // [GAS 연동] 신규/수정 저장
    const handleSave = async (formData) => {
      const action = editTarget ? 'updateRequest' : 'addRequest';
      const payload = {
        이벤트명: formData.title,
        담당자: formData.manager,
        배너유형: formData.bannerType,
        편성그룹: formData.targetGroup,
        편성채널: formData.targetChannel,
        편성프로그램: formData.targetProgram,
        요청시작일: formData.start,
        요청종료일: formData.end,
        상태: '신규(요청)'
      };

      try {
        await fetch(GAS_API_URL, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ action: action, payload: payload })
        });
        alert("요청이 처리되었습니다.");
        loadData();
      } catch(e) {
        // API 에러 시에도 프론트엔드 리스트 업데이트 (테스트용)
        if (editTarget) {
          setEvents(events.map(e => e.id === editTarget.id ? { ...e, ...formData } : e));
        } else {
          setEvents([...events, { ...formData, id: Date.now().toString(), status: 'request' }]);
        }
        alert("프론트엔드 임시 저장되었습니다.");
      }
      closeModal();
    };

    // [GAS 연동] 승인 처리
    const handleBulkApprove = async (ids) => {
      try {
        for (const id of ids) {
          await fetch(GAS_API_URL, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ action: 'approveRequest', payload: { 원본요청ID: id } })
          });
        }
        alert("선택한 항목이 승인되었습니다.");
        loadData();
      } catch(e) {
        setEvents(events.map(e => ids.includes(e.id) ? { ...e, status: 'approved' } : e));
      }
    };

    return (
      <div className="w-full h-full flex bg-gray-50">
        {/* 사이드바 */}
        <div className="w-64 bg-white border-r border-gray-200 flex flex-col shrink-0">
          <div className="p-6 flex items-center gap-3 border-b border-gray-100">
            <div className="bg-red-600 text-white font-black text-xl w-10 h-10 flex items-center justify-center rounded shadow-sm">B</div>
            <div><h1 className="font-bold text-gray-800 leading-tight text-sm">실시간 배너<br/>편성 요청 시스템</h1></div>
          </div>
          <nav className="flex-1 py-4 flex flex-col gap-1">
            <a href="#" onClick={(e) => { e.preventDefault(); setCurrentMenu('list'); }} className={`sidebar-item flex items-center gap-3 px-6 py-3 text-sm font-medium text-gray-600 ${currentMenu === 'list' ? 'active' : ''}`}>
              <FeatherIcon name="list" className="w-4 h-4" /> 편성 리스트
            </a>
            <a href="#" onClick={(e) => { e.preventDefault(); setCurrentMenu('approval'); }} className={`sidebar-item flex items-center gap-3 px-6 py-3 text-sm font-medium text-gray-600 ${currentMenu === 'approval' ? 'active' : ''}`}>
              <FeatherIcon name="check-circle" className="w-4 h-4" /> 프로모션 승인
            </a>
            <a href="#" onClick={(e) => { e.preventDefault(); setCurrentMenu('calendar'); }} className={`sidebar-item flex items-center gap-3 px-6 py-3 text-sm font-medium text-gray-600 ${currentMenu === 'calendar' ? 'active' : ''}`}>
              <FeatherIcon name="calendar" className="w-4 h-4" /> 편성 캘린더
            </a>
          </nav>
        </div>

        {/* 메인 콘텐츠 영역 */}
        <div className="flex-1 flex flex-col min-w-0">
          <header className="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8 shrink-0 z-10 shadow-sm">
            <h2 className="text-lg font-bold text-gray-800 flex items-center gap-2">
              {currentMenu === 'list' && <><FeatherIcon name="list" className="w-5 h-5 text-blue-600"/> 전체 편성 리스트</>}
              {currentMenu === 'approval' && <><FeatherIcon name="check-circle" className="w-5 h-5 text-green-600"/> 대기열 승인 관리</>}
              {currentMenu === 'calendar' && <><FeatherIcon name="calendar" className="w-5 h-5 text-purple-600"/> 타임라인 캘린더</>}
            </h2>
            
            <div className="flex items-center gap-4">
              <div className="flex items-center bg-gray-100 rounded-lg px-3 py-1.5 border border-gray-200">
                <FeatherIcon name="filter" className="w-4 h-4 text-gray-500 mr-2"/>
                <select value={filterType} onChange={(e) => setFilterType(e.target.value)} className="bg-transparent text-sm font-medium text-gray-700 outline-none cursor-pointer">
                  <option value="전체">모든 배너 유형</option>
                  {CONFIG.bannerTypes.map(b => <option key={b} value={b}>{b}</option>)}
                </select>
              </div>
              {currentMenu === 'list' && (
                <button onClick={() => openModal()} className="bg-blue-600 hover:bg-blue-700 text-white font-bold px-4 py-2 rounded-lg text-sm flex items-center gap-1 transition-colors shadow-sm">
                  <FeatherIcon name="plus" className="w-4 h-4"/> 신규 요청
                </button>
              )}
            </div>
          </header>

          <main className="flex-1 overflow-hidden relative">
            {currentMenu === 'list' && <ListView events={filteredEvents} onEdit={openModal} />}
            {currentMenu === 'approval' && (
              isApprovalAuthed 
                ? <ApprovalView events={filteredEvents} onApprove={handleBulkApprove} /> 
                : <PasswordPrompt onAuth={() => setIsApprovalAuthed(true)} />
            )}
            {currentMenu === 'calendar' && <TimelineView events={filteredEvents} onEventClick={openModal} />}
          </main>
        </div>

        {isModalOpen && <EventModal eventData={editTarget} channelDB={channelDB} channelGroups={channelGroups} onClose={closeModal} onSave={handleSave} />}
      </div>
    );
  }

  // --- [뷰 컴포넌트: 1. 편성 리스트] ---
  const ListView = ({ events, onEdit }) => {
    const getTargetDisplay = (e) => {
      if (!['미니EPG', '일반채널 배너트리거'].includes(e.bannerType)) return '-';
      return `${e.targetGroup || ''} / ${e.targetChannel || ''} / ${e.targetProgram || ''}`;
    };

    return (
      <div className="h-full overflow-y-auto p-6">
        <div className="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden">
          <table className="w-full text-left text-sm">
            <thead className="bg-gray-50 border-b border-gray-200 text-gray-600 font-bold">
              <tr>
                <th className="p-4 w-16 text-center">상태</th>
                <th className="p-4">이벤트명</th>
                <th className="p-4">배너유형</th>
                <th className="p-4">편성 대상 (영역)</th>
                <th className="p-4">요청기간</th>
                <th className="p-4">담당자</th>
              </tr>
            </thead>
            <tbody className="divide-y divide-gray-100">
              {events.length === 0 ? <tr><td colSpan="6" className="p-8 text-center text-gray-500">데이터가 없습니다.</td></tr> : null}
              {events.map(e => {
                const isReq = e.status === 'request';
                return (
                  <tr key={e.id} onClick={() => onEdit(e)} className={`hover:bg-blue-50 cursor-pointer transition-colors ${isReq ? 'bg-white' : 'bg-gray-50/50 opacity-80'}`}>
                    <td className="p-4 text-center">
                      <span className={`inline-block px-2 py-1 rounded text-xs font-bold ${isReq ? 'bg-orange-100 text-orange-700' : 'bg-green-100 text-green-700'}`}>
                        {isReq ? '대기' : '승인'}
                      </span>
                    </td>
                    <td className="p-4 font-bold text-gray-800">{e.title}</td>
                    <td className="p-4 text-gray-600">{e.bannerType}</td>
                    <td className="p-4 text-gray-600 text-xs">{getTargetDisplay(e)}</td>
                    <td className="p-4 text-gray-600 whitespace-nowrap">{e.start} ~ {e.end}</td>
                    <td className="p-4 text-gray-600">{e.manager}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    );
  };

  // --- [뷰 컴포넌트: 2. 승인 메뉴 & 비밀번호] ---
  const PasswordPrompt = ({ onAuth }) => {
    const [pwd, setPwd] = React.useState('');
    const checkPwd = (e) => {
      e.preventDefault();
      if (pwd === '2685') onAuth();
      else { alert('비밀번호가 일치하지 않습니다.'); setPwd(''); }
    };
    return (
      <div className="h-full flex items-center justify-center bg-gray-100">
        <form onSubmit={checkPwd} className="bg-white p-8 rounded-xl shadow-lg border border-gray-200 w-96 flex flex-col items-center">
          <div className="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mb-4">
            <FeatherIcon name="lock" className="w-8 h-8"/>
          </div>
          <h3 className="text-xl font-bold text-gray-800 mb-2">관리자 인증</h3>
          <p className="text-sm text-gray-500 mb-6 text-center">프로모션 승인은 관리자만 접근할 수 있습니다.<br/>비밀번호를 입력해주세요.</p>
          <input type="password" value={pwd} onChange={e=>setPwd(e.target.value)} autoFocus placeholder="비밀번호 입력" className="w-full border border-gray-300 rounded-lg p-3 text-center mb-4 focus:ring-2 focus:ring-red-500 outline-none font-mono text-lg tracking-widest"/>
          <button type="submit" className="w-full bg-red-600 text-white font-bold py-3 rounded-lg hover:bg-red-700 transition-colors">잠금 해제</button>
        </form>
      </div>
    );
  };

  const ApprovalView = ({ events, onApprove }) => {
    const pendingEvents = events.filter(e => e.status === 'request');
    const [selected, setSelected] = React.useState([]);

    const toggleSelect = (id) => setSelected(prev => prev.includes(id) ? prev.filter(item => item !== id) : [...prev, id]);
    const selectAll = () => setSelected(selected.length === pendingEvents.length ? [] : pendingEvents.map(e => e.id));

    return (
      <div className="h-full flex flex-col p-6">
        <div className="mb-4 flex justify-between items-end">
          <div><h3 className="text-lg font-bold text-gray-800">승인 대기 목록</h3></div>
          <button onClick={() => onApprove(selected)} disabled={selected.length === 0} className="bg-green-600 hover:bg-green-700 disabled:bg-gray-300 text-white font-bold px-6 py-2.5 rounded-lg text-sm flex items-center gap-2 transition-colors shadow-sm">
            <FeatherIcon name="check" className="w-4 h-4"/> 선택 항목 승인 ({selected.length})
          </button>
        </div>
        <div className="bg-white border border-gray-200 rounded-xl shadow-sm flex-1 overflow-y-auto">
          <table className="w-full text-left text-sm">
            <thead className="bg-gray-50 border-b border-gray-200 sticky top-0 z-10">
              <tr>
                <th className="p-4 w-12 text-center"><input type="checkbox" onChange={selectAll} checked={selected.length > 0 && selected.length === pendingEvents.length} className="w-4 h-4 rounded text-blue-600 cursor-pointer"/></th>
                <th className="p-4">이벤트명</th>
                <th className="p-4">배너유형</th>
                <th className="p-4">요청기간</th>
              </tr>
            </thead>
            <tbody className="divide-y divide-gray-100">
              {pendingEvents.length === 0 ? <tr><td colSpan="4" className="p-12 text-center text-gray-500">승인 대기 중인 항목이 없습니다.</td></tr> : null}
              {pendingEvents.map(e => (
                <tr key={e.id} className="hover:bg-blue-50 cursor-pointer transition-colors" onClick={() => toggleSelect(e.id)}>
                  <td className="p-4 text-center" onClick={(ev)=>ev.stopPropagation()}><input type="checkbox" checked={selected.includes(e.id)} onChange={() => toggleSelect(e.id)} className="w-4 h-4 rounded text-blue-600 cursor-pointer"/></td>
                  <td className="p-4 font-bold text-gray-800">{e.title}</td>
                  <td className="p-4 text-gray-600"><span className="bg-gray-100 px-2 py-1 rounded border border-gray-200 text-xs">{e.bannerType}</span></td>
                  <td className="p-4 text-gray-600">{e.start} ~ {e.end}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    );
  };

  // --- [뷰 컴포넌트: 3. 타임라인 캘린더] ---
  const TimelineView = ({ events, onEventClick }) => {
    const viewStartDate = new Date('2026-07-06');
    const daysToView = 14; 
    const cellWidth = 60; 
    
    const dates = Array.from({length: daysToView}, (_, i) => {
      const d = new Date(viewStartDate);
      d.setDate(d.getDate() + i);
      return d;
    });

    const resources = CONFIG.bannerTypes;

    const getEventStyle = (event) => {
      const eStart = new Date(event.start);
      const eEnd = new Date(event.end);
      let rStart = eStart < viewStartDate ? viewStartDate : eStart;
      const leftDays = Math.floor(Math.abs(rStart - viewStartDate) / 86400000);
      const widthDays = Math.floor(Math.abs(eEnd - eStart) / 86400000) + 1;
      return { left: `${leftDays * cellWidth}px`, width: `${widthDays * cellWidth}px` };
    };

    return (
      <div className="h-full flex flex-col p-6 bg-gray-50">
        <div className="flex-1 bg-white border border-gray-200 rounded-xl shadow-sm flex flex-col overflow-hidden">
          <div className="h-12 flex items-center justify-between px-4 border-b border-gray-200 bg-gray-50 shrink-0">
            <div className="text-sm font-bold text-gray-700">2026년 7월 편성 현황</div>
          </div>
          <div className="flex flex-1 overflow-hidden">
            <div className="w-48 shrink-0 border-r border-gray-200 bg-gray-50">
              <div className="h-12 border-b border-gray-200 flex items-center justify-center text-xs font-bold text-gray-500">배너 유형 (영역)</div>
              {resources.map(res => (
                <div key={res} className="h-16 border-b border-gray-200 px-3 flex items-center justify-center text-center text-sm font-bold text-gray-700 bg-white shadow-[2px_0_4px_rgba(0,0,0,0.02)] z-10 relative">
                  {res}
                </div>
              ))}
            </div>
            <div className="flex-1 overflow-x-auto relative">
              <div className="flex h-12 border-b border-gray-200 sticky top-0 bg-white z-10" style={{ width: `${daysToView * cellWidth}px` }}>
                {dates.map((d, i) => (
                  <div key={i} className={`border-r border-gray-100 flex flex-col items-center justify-center shrink-0 ${d.getDay() === 0 || d.getDay() === 6 ? 'bg-red-50/30 text-red-500' : 'text-gray-600'}`} style={{ width: `${cellWidth}px` }}>
                    <span className="text-[10px] font-bold">{['일','월','화','수','목','금','토'][d.getDay()]}</span>
                    <span className="text-sm font-black">{d.getDate()}</span>
                  </div>
                ))}
              </div>
              <div className="relative timeline-grid" style={{ width: `${daysToView * cellWidth}px`, height: `${resources.length * 4}rem` }}>
                {resources.map((res) => {
                  const rowEvents = events.filter(e => e.bannerType === res);
                  return (
                    <div key={res} className="h-16 border-b border-gray-100 relative group hover:bg-blue-50/20">
                      {rowEvents.map(event => {
                        const style = getEventStyle(event);
                        const isReq = event.status === 'request';
                        const visualClass = isReq ? 'border-2 border-dashed border-orange-500 bg-white text-orange-700 font-bold shadow-sm' : 'bg-blue-500 text-white font-medium shadow';
                        return (
                          <div key={event.id} onClick={() => onEventClick(event)} className={`event-bar absolute top-2 h-11 rounded-md px-2 py-1 overflow-hidden cursor-pointer flex flex-col justify-center text-xs leading-tight ${visualClass}`} style={{ left: style.left, width: `calc(${style.width} - 4px)` }}>
                            <div className="truncate">{event.title}</div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  };

  // --- [뷰 컴포넌트: 4. 공통 팝업 모달 (Form)] ---
  const EventModal = ({ eventData, channelDB, channelGroups, onClose, onSave }) => {
    const isReadOnly = eventData && eventData.status === 'approved';
    const [form, setForm] = React.useState(eventData || {
      title: '', manager: '', bannerType: CONFIG.bannerTypes[0], 
      targetGroup: '', targetChannel: '', targetProgram: '',
      landingType: CONFIG.landingTypes[0], landingDetail: '', jiraLink: '', 
      start: '', end: ''
    });

    const needsTargeting = ['미니EPG', '일반채널 배너트리거'].includes(form.bannerType);
    const availableChannels = form.targetGroup ? (channelDB[form.targetGroup] || []) : [];

    const handleChange = (e) => {
      const { name, value } = e.target;
      // 채널 그룹이 변경되면 하위 채널 번호를 초기화
      if (name === 'targetGroup') {
        setForm(prev => ({ ...prev, [name]: value, targetChannel: '' }));
      } else {
        setForm(prev => ({ ...prev, [name]: value }));
      }
    };

    const handleSubmit = (e) => {
      e.preventDefault();
      onSave(form);
    };

    return (
      <div className="fixed inset-0 z-50 flex items-center justify-center modal-overlay bg-gray-900/40 backdrop-blur-sm p-4">
        <div className="bg-white rounded-2xl shadow-2xl w-full max-w-3xl overflow-hidden flex flex-col modal-content max-h-[95vh]">
          
          <div className={`px-6 py-4 border-b flex justify-between items-center text-white ${isReadOnly ? 'bg-gray-600' : 'bg-blue-600'}`}>
            <h3 className="font-bold text-lg flex items-center gap-2">
              <FeatherIcon name={isReadOnly ? 'file-text' : 'edit'} className="w-5 h-5"/>
              {isReadOnly ? '편성 상세 정보 (읽기 전용)' : (eventData ? '편성 요청 수정' : '신규 편성 요청')}
            </h3>
            <button onClick={onClose} className="text-white/80 hover:text-white hover:rotate-90 transition-transform"><FeatherIcon name="x" className="w-6 h-6"/></button>
          </div>

          <form id="modalForm" onSubmit={handleSubmit} className="p-6 overflow-y-auto flex-1 space-y-6">
            {isReadOnly && <div className="bg-gray-100 text-gray-600 text-sm p-3 rounded-lg flex items-center gap-2 font-bold mb-2"><FeatherIcon name="lock" className="w-4 h-4"/> 이미 승인된 프로모션은 수정할 수 없습니다.</div>}
            
            <div className="grid grid-cols-2 gap-5">
              <div className="col-span-2">
                <label className="block text-sm font-bold text-gray-700 mb-1.5">이벤트명 (타이틀)</label>
                <input type="text" name="title" value={form.title} onChange={handleChange} readOnly={isReadOnly} required placeholder="예: 여름방학 키즈 특집" className="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none read-only:bg-gray-100 read-only:text-gray-500"/>
              </div>

              <div>
                <label className="block text-sm font-bold text-gray-700 mb-1.5">담당자</label>
                <input type="text" name="manager" value={form.manager} onChange={handleChange} readOnly={isReadOnly} required placeholder="이름 입력" className="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none read-only:bg-gray-100 read-only:text-gray-500"/>
              </div>

              <div>
                <label className="block text-sm font-bold text-gray-700 mb-1.5">배너 영역</label>
                {isReadOnly ? (
                  <input type="text" value={form.bannerType} readOnly className="w-full border border-gray-300 rounded-lg p-2.5 text-sm bg-gray-100 text-gray-500"/>
                ) : (
                  <select name="bannerType" value={form.bannerType} onChange={handleChange} className="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none cursor-pointer">
                    {CONFIG.bannerTypes.map(b => <option key={b} value={b}>{b}</option>)}
                  </select>
                )}
              </div>
            </div>

            {needsTargeting && (
              <div className="p-4 bg-gray-50 border border-gray-200 rounded-lg">
                <h4 className="text-sm font-bold text-gray-800 mb-3 flex items-center gap-1"><FeatherIcon name="target" className="w-4 h-4 text-blue-600"/> 상세 편성 영역 설정</h4>
                <div className="grid grid-cols-3 gap-4">
                  <div>
                    <label className="block text-xs font-bold text-gray-600 mb-1.5">채널 그룹</label>
                    {isReadOnly ? (
                      <input type="text" value={form.targetGroup} readOnly className="w-full border border-gray-300 rounded-lg p-2 text-sm bg-gray-100 text-gray-500"/>
                    ) : (
                      <select name="targetGroup" value={form.targetGroup} onChange={handleChange} required className="w-full border border-gray-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none cursor-pointer">
                        <option value="">그룹 선택</option>
                        {channelGroups.map(g => <option key={g} value={g}>{g}</option>)}
                      </select>
                    )}
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-gray-600 mb-1.5">채널 리스트</label>
                    {isReadOnly ? (
                      <input type="text" value={form.targetChannel} readOnly className="w-full border border-gray-300 rounded-lg p-2 text-sm bg-gray-100 text-gray-500"/>
                    ) : (
                      <select name="targetChannel" value={form.targetChannel} onChange={handleChange} required disabled={!form.targetGroup} className="w-full border border-gray-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none cursor-pointer disabled:bg-gray-100">
                        <option value="">채널 선택</option>
                        {availableChannels.map(ch => <option key={ch} value={ch}>{ch}</option>)}
                      </select>
                    )}
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-gray-600 mb-1.5">프로그램명</label>
                    <input type="text" name="targetProgram" value={form.targetProgram} onChange={handleChange} readOnly={isReadOnly} required placeholder="예: 런닝맨" className="w-full border border-gray-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none read-only:bg-gray-100 read-only:text-gray-500"/>
                  </div>
                </div>
              </div>
            )}

            <div className="grid grid-cols-2 gap-5 border-t pt-5">
              <div>
                <label className="block text-sm font-bold text-gray-700 mb-1.5">랜딩 유형</label>
                {isReadOnly ? (
                  <input type="text" value={form.landingType} readOnly className="w-full border border-gray-300 rounded-lg p-2.5 text-sm bg-gray-100 text-gray-500"/>
                ) : (
                  <select name="landingType" value={form.landingType} onChange={handleChange} required className="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none cursor-pointer">
                    {CONFIG.landingTypes.map(l => <option key={l} value={l}>{l}</option>)}
                  </select>
                )}
              </div>

              <div>
                <label className="block text-sm font-bold text-gray-700 mb-1.5">랜딩 세부 내용 (ID / URL)</label>
                <input type="text" name="landingDetail" value={form.landingDetail} onChange={handleChange} readOnly={isReadOnly} required placeholder="U52_07 또는 URL 입력" className="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none read-only:bg-gray-100 read-only:text-gray-500"/>
              </div>

              <div className="col-span-2">
                <label className="block text-sm font-bold text-gray-700 mb-1.5">Jira 링크</label>
                <input type="url" name="jiraLink" value={form.jiraLink} onChange={handleChange} readOnly={isReadOnly} placeholder="https://jira... (선택사항)" className="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none read-only:bg-gray-100 read-only:text-gray-500"/>
              </div>

              <div>
                <label className="block text-sm font-bold text-gray-700 mb-1.5">시작일</label>
                <input type="date" name="start" value={form.start} onChange={handleChange} readOnly={isReadOnly} required className="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none read-only:bg-gray-100 read-only:text-gray-500"/>
              </div>

              <div>
                <label className="block text-sm font-bold text-gray-700 mb-1.5">종료일</label>
                <input type="date" name="end" value={form.end} min={form.start} onChange={handleChange} readOnly={isReadOnly} required className="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none read-only:bg-gray-100 read-only:text-gray-500"/>
              </div>
            </div>
          </form>

          <div className="px-6 py-4 border-t bg-gray-50 flex justify-end gap-3">
            <button type="button" onClick={onClose} className="px-5 py-2.5 rounded-lg text-sm font-bold text-gray-600 bg-white border border-gray-300 hover:bg-gray-100 transition-colors">닫기</button>
            {!isReadOnly && (
              <button type="submit" form="modalForm" className="px-6 py-2.5 rounded-lg text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 transition-colors shadow-sm flex items-center gap-2">
                <FeatherIcon name="save" className="w-4 h-4"/> 저장하기
              </button>
            )}
          </div>
        </div>
      </div>
    );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
